<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }  :root {
    --bg:      #080808;
    --s1:      #101012;   /* card surface */
    --s2:      #161618;   /* elevated surface */
    --s3:      #1c1c1f;   /* border / divider */
    --red:        #E81828;
    --red-dim:    rgba(232,24,40,.12);
    --navy:       #003087;   /* Phillies navy */
    --navy-dim:   rgba(0,48,135,.22);
    --powder:     #7EB4D8;   /* retro powder blue — '70s road uniforms */
    --powder-dim: rgba(126,180,216,.1);
    --cream:      #F0E8D0;   /* vintage cream */
    --win:     #22c55e;
    --win-dim: rgba(34,197,94,.1);
    --loss:    #ef4444;
    --loss-dim:rgba(239,68,68,.1);
    --gold:    #f59e0b;
    --gold-dim:rgba(245,158,11,.1);
    --t1: #f0f0f2;   /* primary text */
    --t2: #aaa;      /* secondary */
    --t3: #666;      /* tertiary */
    --t4: #3a3a3e;   /* ghost */
    --shadow-sm: 0 1px 3px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.03);
    --shadow-md: 0 4px 16px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.03);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.04);
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
  }
  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--t1);
    min-height: 100vh;
    padding-bottom: 52px;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  /* ── HEADER ── */
  header {
    position: relative;
    background: linear-gradient(135deg, #070010 0%, #060d20 60%, #040812 100%);
    padding: 12px 20px 10px;
    text-align: center;
    overflow: hidden;
    border-bottom: 1px solid rgba(0,48,135,.4);
  }
  /* pinstripe */
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to right,
      transparent 0, transparent 19px,
      rgba(126,180,216,.04) 19px, rgba(126,180,216,.04) 20px
    );
    pointer-events: none;
  }
  /* red → navy gradient top bar */
  header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red) 0%, var(--navy) 100%);
  }
  .hdr-name {
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 7px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--red) 0%, var(--powder) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-family: 'Arial Black', Arial, sans-serif;
  }
  .hdr-sub {
    font-size: 0.5rem;
    color: rgba(126,180,216,.5);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .hdr-refresh {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--s3);
    border-radius: 20px;
    color: var(--t3);
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .2s, color .2s;
  }
  .refresh-btn:hover { border-color: var(--red); color: var(--red); }
  .last-upd { font-size: 0.56rem; color: var(--t4); letter-spacing: .5px; }

  /* live pulse */
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    vertical-align: middle;
    margin-right: 4px;
    animation: ldpulse 1.4s ease-in-out infinite;
  }
  @keyframes ldpulse { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── TABS ── */
  .tabs {
    display: flex;
    margin: 14px 16px 0;
    background: linear-gradient(135deg, rgba(0,48,135,.12) 0%, rgba(232,24,40,.08) 100%);
    border-radius: var(--r-md);
    padding: 4px;
    gap: 3px;
    border: 1px solid rgba(0,48,135,.25);
    box-shadow: var(--shadow-sm);
  }
  .tab {
    flex: 1;
    padding: 9px 6px;
    text-align: center;
    cursor: pointer;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    border-radius: var(--r-sm);
    border: none;
    background: transparent;
    color: var(--t3);
    transition: background .18s, color .18s;
    font-family: inherit;
  }
  .tab.active { background: linear-gradient(135deg, var(--red) 0%, #b01020 100%); color: #fff; box-shadow: 0 1px 4px rgba(232,24,40,.4); }
  .tab:not(.active):hover { color: var(--powder); background: var(--navy-dim); }

  /* ── CONTENT ── */
  .content { padding: 16px; display: none; }
  .content.active { display: block; }

  /* ── UTILITY ── */
  .section-label {
    font-size: 0.54rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--powder);
    margin: 20px 0 8px;
    padding: 4px 8px;
    border-left: 2px solid var(--navy);
    border-bottom: 1px solid rgba(0,48,135,.2);
    background: linear-gradient(90deg, var(--navy-dim) 0%, transparent 70%);
    border-radius: 0 2px 2px 0;
  }
  .card {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-pad { padding: 16px; }

  /* ── NEXT GAME ── */
  .ng-hero {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-md);
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .ng-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--red) 0%, var(--navy) 100%);
  }
  .ng-label {
    font-size: 0.56rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--red);
    text-align: center;
    margin-bottom: 14px;
  }
  .ng-venue {
    text-align: center;
    font-size: 0.6rem;
    color: var(--t3);
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .ng-matchup {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 18px;
  }
  .ng-team { text-align: center; flex: 1; min-width: 0; }
  .ng-emoji { font-size: 2.8rem; display: block; margin-bottom: 4px; line-height: 1; }
  .ng-tname { font-size: 0.82rem; font-weight: 700; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ng-tname.phils { color: var(--red); }
  .ng-vs {
    font-size: 0.6rem;
    color: var(--t4);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 12px;
    border: 1px solid var(--s3);
    border-radius: 20px;
    background: var(--s2);
    flex-shrink: 0;
    margin: 0 12px;
  }
  .ng-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .ng-meta-item {
    background: var(--s2);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    border: 1px solid var(--s3);
  }
  .ng-meta-lbl { font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; color: var(--powder); margin-bottom: 4px; }
  .ng-meta-val { font-size: 0.78rem; font-weight: 700; color: var(--t1); }

  /* Weather bar */
  .wx-bar {
    display: flex;
    align-items: stretch;
    background: var(--s2);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .wx-entry {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 14px;
  }
  .wx-lbl { font-size: 0.44rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t4); font-weight: 700; white-space: nowrap; }
  .wx-icon { font-size: 1.2rem; line-height: 1; }
  .wx-temp { font-size: 0.82rem; font-weight: 700; color: var(--t1); }
  .wx-desc { font-size: 0.62rem; color: var(--t3); flex: 1; }
  .wx-precip { font-size: 0.56rem; color: var(--powder); background: rgba(99,179,237,.1); border: 1px solid rgba(99,179,237,.2); border-radius: 10px; padding: 2px 7px; white-space: nowrap; }
  .wx-divider { width: 1px; background: var(--s3); align-self: stretch; }
  .wx-compact { margin-bottom: 0; border-radius: 0; border-left: none; border-right: none; border-top: none; background: rgba(255,255,255,.03); }

  /* Score display */
  .score-block {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    background: var(--s2);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 16px;
    margin-bottom: 14px;
  }
  .score-side { text-align: center; flex: 1; }
  .score-num {
    font-size: 3rem;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    line-height: 1;
  }
  .score-num.ahead { color: var(--win); }
  .score-num.behind { color: var(--loss); }
  .score-num.tied-c { color: var(--gold); }
  .score-lbl { font-size: 0.52rem; letter-spacing: 2px; text-transform: uppercase; color: var(--t3); margin-top: 4px; }
  .score-divider {
    width: 1px;
    height: 48px;
    background: var(--s3);
    margin: 0 16px;
    flex-shrink: 0;
  }
  .score-status-row {
    text-align: center;
    font-size: 0.56rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-top: 10px;
  }

  /* Countdown */
  .countdown {
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 14px;
    text-align: center;
    background: var(--s2);
  }
  .cd-lbl { font-size: 0.54rem; letter-spacing: 2px; text-transform: uppercase; color: var(--t3); margin-bottom: 6px; }
  .cd-time {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: 2px;
    font-family: 'Arial Black', Arial, sans-serif;
    color: var(--t1);
  }

  /* Info rows (TV / Radio) */
  .info-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s;
  }
  a.info-row:hover { border-color: var(--red); }
  .ir-icon { font-size: 1.3rem; width: 32px; text-align: center; flex-shrink: 0; }
  .ir-title { font-size: 0.82rem; font-weight: 700; }
  .ir-sub { font-size: 0.64rem; color: var(--t2); margin-top: 2px; }
  .ir-url { font-size: 0.58rem; color: var(--red); margin-top: 2px; }
  .ir-badge {
    margin-left: auto;
    font-size: 0.54rem;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .ir-badge.free { background: var(--win-dim); color: var(--win); }
  .ir-badge.sub { background: var(--s2); color: var(--t3); border: 1px solid var(--s3); }
  .ir-arrow { font-size: 0.75rem; color: var(--t4); margin-left: 6px; flex-shrink: 0; }

  /* ── SCHEDULE ── */
  .week-hdr {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cream);
    margin: 0 0 12px;
    padding: 8px 12px;
    background: linear-gradient(90deg, var(--navy-dim) 0%, transparent 80%);
    border-left: 3px solid var(--navy);
    border-bottom: 1px solid rgba(0,48,135,.2);
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
  }
  .week-hdr span { color: var(--powder); margin-right: 6px; }

  .sc-card {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-left: 3px solid var(--t4);
    border-radius: var(--r-lg);
    overflow: hidden;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s;
  }
  .sc-card.live  { border-color: var(--red); border-left-color: var(--red); }
  .sc-card.today { border-left-color: var(--navy); }
  .sc-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    background: linear-gradient(90deg, rgba(0,48,135,.1) 0%, var(--s2) 50%);
    border-bottom: 1px solid rgba(0,48,135,.15);
  }
  .sc-hdr-date { font-size: 0.64rem; color: var(--powder); font-weight: 600; letter-spacing: .5px; }
  .sc-pill {
    font-size: 0.56rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .sc-pill.sched { background: var(--s1); color: var(--t3); border: 1px solid var(--s3); }
  .sc-pill.live-p { background: var(--red); color: #fff; }
  .sc-pill.win-p { background: var(--win-dim); color: var(--win); }
  .sc-pill.loss-p { background: var(--loss-dim); color: var(--loss); }
  .sc-body { padding: 14px; }
  .sc-matchup {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .sc-team-emoji { font-size: 1.4rem; flex-shrink: 0; }
  .sc-opp-name { font-size: 1rem; font-weight: 700; flex: 1; }
  .sc-ha { font-size: 0.58rem; color: var(--t3); }
  .sc-final { font-size: 1rem; font-weight: 900; font-family: 'Arial Black', Arial, sans-serif; }
  .sc-final.w { color: var(--win); }
  .sc-final.l { color: var(--loss); }
  .sc-final.lv { color: var(--red); }
  .sc-info-row { font-size: 0.66rem; color: var(--t2); line-height: 1.9; }
  .sc-info-row strong { color: var(--t1); font-weight: 600; }
  .sc-venue { font-size: 0.58rem; color: var(--t4); margin-top: 6px; letter-spacing: .3px; }
  .no-games { text-align: center; padding: 48px 20px; color: var(--t4); font-size: 0.72rem; letter-spacing: 1px; }

  /* ── SERIES TRACKER ── */

  /* Top summary */
  .sr-top {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }
  .sr-top::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--red) 0%, var(--navy) 100%);
  }
  .sr-top-title {
    font-size: 0.54rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--powder);
    text-align: center;
    margin-bottom: 14px;
  }
  .sr-counts {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .sr-cbox {
    text-align: center;
    background: var(--s2);
    border: 1px solid var(--s3);
    border-radius: var(--r-sm);
    padding: 12px 6px;
  }
  .sr-cnum {
    font-size: 2.2rem;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    line-height: 1;
  }
  .sr-cnum.g { color: var(--win); }
  .sr-cnum.r { color: var(--loss); }
  .sr-cnum.y { color: var(--gold); }
  .sr-clbl { font-size: 0.5rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t3); margin-top: 4px; }
  .sr-pct { font-size: 1rem; font-weight: 700; color: var(--gold); text-align: center; letter-spacing: 1px; }
  .sr-pct-lbl { font-size: 0.5rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t3); text-align: center; margin-top: 2px; margin-bottom: 12px; }
  .sr-pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
  .pill {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.5rem; font-weight: 700;
  }
  .pill.w { background: var(--win-dim); color: var(--win); }
  .pill.l { background: var(--loss-dim); color: var(--loss); }
  .pill.s { background: var(--gold-dim); color: var(--gold); }

  /* Season grid */
  .sg-wrap {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .sg-title {
    font-size: 0.54rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--powder);
    margin-bottom: 12px;
  }
  .sg-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .sg-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    aspect-ratio: 1;
    border-radius: var(--r-sm);
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: transform .12s, opacity .12s;
    padding: 4px 2px;
  }
  .sg-tile:hover { transform: scale(1.06); opacity: .9; }
  .sg-tile:active { transform: scale(.97); }
  .sg-emoji { font-size: 1.1rem; line-height: 1; }
  .sg-abbr { font-size: 0.5rem; font-weight: 700; letter-spacing: .3px; line-height: 1; }
  .sg-res { font-size: 0.44rem; font-weight: 700; letter-spacing: .3px; line-height: 1; opacity: .85; }
  .sg-tile.won   { background: var(--win-dim);  color: var(--win);  border: 1px solid rgba(34,197,94,.15); }
  .sg-tile.sweep { background: rgba(34,197,94,.18); color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
  .sg-tile.lost  { background: var(--loss-dim); color: var(--loss); border: 1px solid rgba(239,68,68,.15); }
  .sg-tile.swept { background: rgba(239,68,68,.18); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
  .sg-tile.split { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(245,158,11,.15); }
  @keyframes blink-tile-green  { 0%,100%{background:rgba(34,197,94,.14);box-shadow:0 0 7px rgba(34,197,94,.3)} 50%{background:rgba(34,197,94,.04);box-shadow:none} }
  @keyframes blink-tile-red    { 0%,100%{background:rgba(239,68,68,.14);box-shadow:0 0 7px rgba(239,68,68,.3)} 50%{background:rgba(239,68,68,.04);box-shadow:none} }
  @keyframes blink-tile-yellow { 0%,100%{background:rgba(245,158,11,.14);box-shadow:0 0 7px rgba(245,158,11,.3)} 50%{background:rgba(245,158,11,.04);box-shadow:none} }
  @keyframes blink-left-green  { 0%,100%{border-left-color:var(--win)} 50%{border-left-color:rgba(34,197,94,.2)} }
  @keyframes blink-left-red    { 0%,100%{border-left-color:var(--loss)} 50%{border-left-color:rgba(239,68,68,.2)} }
  @keyframes blink-left-yellow { 0%,100%{border-left-color:var(--gold)} 50%{border-left-color:rgba(245,158,11,.2)} }
  .sg-tile.live          { background: rgba(245,158,11,.12); color: var(--gold); border: 1px solid rgba(245,158,11,.25); animation: blink-tile-yellow 1.4s ease-in-out infinite; }
  .sg-tile.live-winning  { color: var(--win); border: 1px solid rgba(34,197,94,.25); animation: blink-tile-green 1.4s ease-in-out infinite; }
  .sg-tile.live-losing   { color: var(--loss); border: 1px solid rgba(239,68,68,.25); animation: blink-tile-red 1.4s ease-in-out infinite; }
  .sg-tile.upcoming { background: var(--s2); color: var(--t4); border: 1px solid var(--s3); }

  /* Pace */
  .pace-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .pace-box {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 14px 12px;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .pace-lbl { font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; color: var(--powder); margin-bottom: 8px; }
  .pace-num {
    font-size: 1.5rem;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    line-height: 1;
    letter-spacing: 1px;
  }
  .pace-num .pw { color: var(--win); }
  .pace-num .pd { color: var(--t4); }
  .pace-num .pl { color: var(--loss); }
  .pace-sub { font-size: 0.5rem; color: var(--t4); margin-top: 5px; line-height: 1.4; }

  /* Standings */
  .std-wrap {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .std-header {
    padding: 10px 14px;
    background: linear-gradient(90deg, var(--navy) 0%, #001a50 100%);
    border-bottom: 1px solid rgba(0,48,135,.4);
    font-size: 0.54rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--powder);
    display: flex;
    justify-content: space-between;
  }
  .std-header-cols { display: flex; gap: 2px; }
  .std-header-col { width: 34px; text-align: right; font-size: 0.5rem; letter-spacing: 1px; }
  .std-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--s3);
    font-size: 0.74rem;
    transition: background .12s;
  }
  .std-row:last-child { border-bottom: none; }
  .std-row:hover { background: var(--s2); }
  .std-row.phils { background: linear-gradient(90deg, rgba(0,48,135,.1) 0%, rgba(232,24,40,.05) 100%); }
  .std-pos { width: 14px; font-size: 0.58rem; color: var(--t3); flex-shrink: 0; }
  .std-emoji { font-size: 0.9rem; width: 22px; text-align: center; flex-shrink: 0; }
  .std-name { flex: 1; font-weight: 600; font-size: 0.76rem; }
  .std-row.phils .std-name { color: var(--red); font-weight: 700; }
  .std-wl { width: 38px; text-align: right; color: var(--t2); font-weight: 700; font-size: 0.7rem; }
  .std-pct { width: 34px; text-align: right; color: var(--t3); font-size: 0.64rem; }
  .std-gb { width: 28px; text-align: right; color: var(--t4); font-size: 0.62rem; }

  /* Series rows — horizontal layout */
  .series-all-title {
    font-size: 0.54rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--powder);
    margin: 4px 0 8px;
    padding: 5px 8px;
    border-left: 2px solid var(--navy);
    background: linear-gradient(90deg, var(--navy-dim) 0%, transparent 70%);
    border-radius: 0 2px 2px 0;
  }

  .sr-row {
    display: flex;
    align-items: stretch;
    background: var(--s1);
    border: 1px solid var(--s3);
    border-left: 3px solid var(--s3);
    border-radius: var(--r-md);
    overflow: hidden;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    scroll-margin-top: 16px;
  }
  .sr-row.won    { border-left-color: var(--win); }
  .sr-row.sweep  { border-left-color: #4ade80; border-color: rgba(34,197,94,.35); box-shadow: 0 0 0 1px rgba(34,197,94,.12), var(--shadow-sm); }
  .sr-row.lost   { border-left-color: var(--loss); }
  .sr-row.swept  { border-left-color: #f87171; border-color: rgba(239,68,68,.3); box-shadow: 0 0 0 1px rgba(239,68,68,.1), var(--shadow-sm); }
  .sr-row.split  { border-left-color: var(--gold); }
  .sr-row.live-r         { border-left-color: var(--gold); animation: blink-left-yellow 1.4s ease-in-out infinite; }
  .sr-row.live-winning-r { border-left-color: var(--win); animation: blink-left-green 1.4s ease-in-out infinite; }
  .sr-row.live-losing-r  { border-left-color: var(--loss); animation: blink-left-red 1.4s ease-in-out infinite; }

  /* Left info panel */
  .sr-left {
    width: 108px;
    flex-shrink: 0;
    background: var(--s2);
    padding: 10px 9px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 5px;
    border-right: 1px solid var(--s3);
  }
  .sr-row.sweep  .sr-left { background: rgba(34,197,94,.07); }
  .sr-row.swept  .sr-left { background: rgba(239,68,68,.07); }
  .sr-row.live-r .sr-left         { background: rgba(245,158,11,.06); }
  .sr-row.live-winning-r .sr-left { background: rgba(34,197,94,.06); }
  .sr-row.live-losing-r .sr-left  { background: rgba(239,68,68,.06); }

  .sr-badge {
    font-size: 0.46rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: .5px;
    text-transform: uppercase;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .sr-badge.won    { background: var(--win-dim); color: var(--win); }
  .sr-badge.sweep  { background: rgba(34,197,94,.22); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
  .sr-badge.lost   { background: var(--loss-dim); color: var(--loss); }
  .sr-badge.swept  { background: rgba(239,68,68,.18); color: #f87171; border: 1px solid rgba(239,68,68,.25); }
  .sr-badge.split  { background: var(--gold-dim); color: var(--gold); }
  .sr-badge.live-r         { background: rgba(245,158,11,.15); color: var(--gold); }
  .sr-badge.live-winning-r { background: var(--win-dim); color: var(--win); }
  .sr-badge.live-losing-r  { background: var(--loss-dim); color: var(--loss); }
  .sr-badge.upcoming { background: var(--s1); color: var(--t3); border: 1px solid var(--s3); }

  .sr-opp-info  { display: flex; align-items: center; gap: 4px; }
  .sr-team-emoji { font-size: 1rem; line-height: 1; }
  .sr-opp-name  { font-size: 0.72rem; font-weight: 700; color: var(--t1); line-height: 1.2; }
  .sr-ha        { font-size: 0.48rem; color: var(--t3); letter-spacing: .3px; }
  .sr-dates     { font-size: 0.46rem; color: var(--t4); letter-spacing: .2px; }
  .sr-gc        { font-size: 0.46rem; color: var(--t3); letter-spacing: .5px; }

  /* Right game cells */
  .sr-right {
    flex: 1;
    display: flex;
    align-items: stretch;
    overflow-x: auto;
  }
  .sr-game {
    flex: 1;
    min-width: 60px;
    padding: 8px 5px;
    text-align: center;
    border-right: 1px solid var(--s3);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .sr-game:last-child { border-right: none; }
  .sr-g-lbl { font-size: 0.44rem; letter-spacing: 1px; text-transform: uppercase; color: var(--t4); margin-bottom: 5px; }
  .sr-g-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 5px;
    border-radius: 4px;
    margin-bottom: 1px;
    width: 100%;
  }
  .sr-g-line.row-win { background: var(--win-dim); }
  .sr-g-abbr { font-size: 0.5rem; font-weight: 700; }
  .sr-g-abbr.p { color: var(--red); }
  .sr-g-abbr.p.phi-win  { color: var(--win); }
  .sr-g-abbr.p.phi-loss { color: var(--loss); }
  .sr-g-abbr.o { color: var(--t3); }
  .sr-g-score.opp-score { color: var(--t3); }
  .sr-g-score { font-size: 0.84rem; font-weight: 900; font-family: 'Arial Black', Arial, sans-serif; }
  .sr-g-score.win  { color: var(--win); }
  .sr-g-score.lose { color: var(--loss); }
  .sr-g-score.live-s { color: var(--red); }
  .sr-g-score.u { color: var(--t4); font-size: 0.58rem; font-weight: 400; font-family: inherit; }
  .sr-g-result { font-size: 0.42rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-top: 3px; }
  .sr-g-result.w { color: var(--win); }
  .sr-g-result.l { color: var(--loss); }
  .sr-g-result.lv { color: var(--red); }
  .sr-g-tv { font-size: 0.4rem; color: var(--t4); margin-top: 2px; }

  /* ── STREAK VISUAL ── */
  .streak-card {
    background: var(--s1);
    border: 1px solid rgba(0,48,135,.25);
    border-top: 2px solid var(--navy);
    border-radius: var(--r-lg);
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }
  .streak-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 11px;
  }
  .streak-lbl {
    font-size: 0.54rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--powder);
  }
  .streak-badge {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: .5px;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .streak-badge.sw { background: var(--win-dim); color: var(--win); }
  .streak-badge.sl { background: var(--loss-dim); color: var(--loss); }
  .streak-pills-row {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-bottom: 10px;
  }
  .streak-pills-row .pill { width: 26px; height: 26px; font-size: 0.52rem; }
  .streak-footer {
    text-align: center;
    font-size: 0.6rem;
    color: var(--t4);
    letter-spacing: .5px;
  }
  .streak-footer strong { color: var(--t2); }

  /* ── GAME NAV ── */
  .ng-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
  }
  .ng-nav-btn {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: 20px;
    color: var(--t2);
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: .5px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .15s, color .15s;
  }
  .ng-nav-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
  .ng-nav-btn:disabled { opacity: .3; cursor: default; }
  .ng-nav-label { font-size: 0.54rem; color: var(--t3); letter-spacing: 1px; text-transform: uppercase; text-align: center; }

  /* ── PROBABLE PITCHERS ── */
  .pitchers-card {
    background: var(--s2);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 10px 14px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .pitchers-card-top { display: flex; align-items: center; gap: 8px; }
  .pitcher-side { flex: 1; text-align: center; }
  .pitcher-lbl { font-size: 0.46rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--powder); margin-bottom: 3px; }
  .pitcher-name { font-size: 0.72rem; font-weight: 700; color: var(--t1); }
  .pitcher-name.phi { color: var(--red); }
  .pitcher-name.tbd { color: var(--t4); font-weight: 400; font-style: italic; font-size: 0.64rem; }
  .pitcher-divider { font-size: 0.52rem; color: var(--t4); font-weight: 700; letter-spacing: 1px; flex-shrink: 0; }
  .ps-toggle-btn { width:100%; background:var(--s1); border:1px solid var(--s3); border-radius:var(--r-sm); color:var(--t3); font-size:0.52rem; letter-spacing:1px; text-transform:uppercase; padding:5px 0; cursor:pointer; }
  .ps-toggle-btn:hover { color:var(--t1); border-color:var(--s4); }
  .ps-expand { display:flex; align-items:flex-start; gap:0; padding-top:4px; border-top:1px solid var(--s3); }
  .ps-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .ps-col-gap { width:1px; background:var(--s3); align-self:stretch; margin:0 8px; }
  .ps-stats { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; }
  .ps-hand { font-size:0.44rem; font-weight:700; padding:2px 5px; border-radius:4px; letter-spacing:.5px; }
  .ps-hand.lhp { background:rgba(99,102,241,.15); color:#818cf8; border:1px solid rgba(99,102,241,.25); }
  .ps-hand.rhp { background:rgba(245,158,11,.12); color:var(--gold); border:1px solid rgba(245,158,11,.2); }
  .ps-stat { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .ps-lbl { font-size:0.4rem; letter-spacing:1px; text-transform:uppercase; color:var(--t4); }
  .ps-stat > :last-child { font-size:0.68rem; font-weight:700; color:var(--t1); }
  .ps-loading { font-size:0.56rem; color:var(--t4); text-align:center; padding:6px 0; }
  .sc-pitchers { font-size: 0.62rem; color: var(--t2); margin-top: 5px; }
  .sc-pitchers span { color: var(--t3); }

  /* ── LINESCORE ── */
  .ls-wrap {
    overflow-x: auto;
    background: var(--s2);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    margin-bottom: 14px;
  }
  .ls-tbl {
    border-collapse: collapse;
    min-width: 100%;
    white-space: nowrap;
  }
  .ls-tbl thead th {
    font-size: 0.46rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--t3);
    padding: 6px 7px;
    text-align: center;
    border-bottom: 1px solid var(--s3);
  }
  .ls-tbl td {
    font-size: 0.7rem;
    text-align: center;
    padding: 7px 7px;
    border-right: 1px solid var(--t4);
    color: var(--t2);
  }
  .ls-tbl td:last-child { border-right: none; }
  .ls-tbl .ls-name { text-align: left; padding-left: 12px; font-size: 0.62rem; font-weight: 700; color: var(--t2); min-width: 42px; }
  .ls-tbl .ls-sep { border-left: 1px solid var(--s3); border-right: none; padding: 0; width: 1px; }
  .ls-tbl .ls-r { font-weight: 900; font-family: 'Arial Black', Arial, sans-serif; color: var(--t1); border-left: 1px solid var(--s3); }
  .ls-tbl .ls-rhe { color: var(--t3); }
  .ls-tbl .ls-x { color: var(--t4); }
  .ls-tbl tr.ls-phi .ls-name { color: var(--red); }
  .ls-tbl tr.ls-phi td { color: var(--t1); }

  /* ── DEEP STATS TOGGLE ── */
  .ds-card {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .ds-toggle-btn {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 16px;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: var(--t2);
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    transition: background .15s, color .15s;
  }
  .ds-toggle-btn:hover { background: var(--s2); color: var(--t1); }
  .ds-toggle-btn.open { color: var(--t1); border-bottom: 1px solid var(--s3); }
  .ds-body { padding: 4px 16px 14px; }
  .ds-section {
    font-size: 0.48rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin: 14px 0 6px;
    padding: 3px 8px;
    border-left: 2px solid var(--red);
    border-bottom: 1px solid rgba(232,24,40,.2);
    background: linear-gradient(90deg, var(--red-dim) 0%, transparent 70%);
    border-radius: 0 2px 2px 0;
  }
  .ds-section:first-child { margin-top: 6px; }
  .ds-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--t4);
  }
  .ds-row:last-child { border-bottom: none; }
  .ds-lbl { font-size: 0.64rem; color: var(--t2); }
  .ds-val { font-size: 0.74rem; font-weight: 700; color: var(--t1); }
  .ds-sub { font-size: 0.5rem; color: var(--t3); margin-left: 5px; font-weight: 400; }

  /* ── STANDINGS FILTERS ── */
  .std-sub-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
    background: linear-gradient(135deg, var(--navy-dim) 0%, rgba(232,24,40,.08) 100%);
    border: 1px solid rgba(0,48,135,.25);
    border-radius: var(--r-md);
    padding: 3px;
  }
  .std-sub-btn {
    flex: 1;
    padding: 7px 4px;
    text-align: center;
    cursor: pointer;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: .3px;
    text-transform: uppercase;

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const PHILLIES_ID = 143, SEASON = 2026;
const MLB_API = 'https://statsapi.mlb.com/api/v1';
let ALL=[], STANDINGS=[], cdTimer=null, currentTab='next', loading=false;

// ─── TEAM EMOJI + ABBR MAP ─────────────────────────────────────────────────
const TEAMS = {
  'Phillies':    { e:'🔔', a:'PHI' },

function teamInfo(name) {

  return { e:'⚾', a:(name||'???').split(' ').pop().substring(0,3).toUpperCase() };

// ─── BROADCAST DB ──────────────────────────────────────────────────────────
const BC = {

function getBc(name) {
  if (!name) return null;
  if (BC[name]) return BC[name];
  for (const [k,v] of Object.entries(BC)) if (name.includes(k)||k.includes(name)) return v;
  return {icon:'📺',display:name,stream:'ESPN app',url:'https://www.espn.com/watch/',type:'sub'};

// ─── API ───────────────────────────────────────────────────────────────────
async function fetchSchedule() {
  const r = await fetch(`${MLB_API}/schedule?sportId=1&teamId=${PHILLIES_ID}&season=${SEASON}&gameType=R&hydrate=broadcasts(all),linescore,probablePitcher&startDate=${SEASON}-01-01&endDate=${SEASON}-12-31`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json();
}
async function fetchStandings() {
  const r = await fetch(`${MLB_API}/standings?leagueId=103,104&season=${SEASON}&standingsType=regularSeason`);
  if (!r.ok) return null; return r.json();
}

// ─── PARSE ─────────────────────────────────────────────────────────────────
function parseGames(data) {
  const games = [];
  for (const dateObj of (data.dates||[])) {
    for (const g of (dateObj.games||[])) {
      const ht=g.teams.home.team.name, at=g.teams.away.team.name;
      const isHome=ht.includes('Philadelphia')||ht.includes('Phillies');
      if (!isHome&&!at.includes('Philadelphia')&&!at.includes('Phillies')) continue;
      const state=g.status?.abstractGameState||'', detail=g.status?.detailedState||'';
      const played=state==='Final'||detail.includes('Final')||detail==='Game Over';
      const inProgress=state==='Live'||detail==='In Progress';
      const postponed=detail.includes('Postponed')||detail.includes('Suspended');
      const hs=(played||inProgress)?(g.teams.home.score??null):null;
      const as_=(played||inProgress)?(g.teams.away.score??null):null;
      const broadcasts=(g.broadcasts||[]).filter(b=>b.type==='TV'&&(b.language==='en'||!b.language)).map(b=>b.name).filter((v,i,a)=>a.indexOf(v)===i);
      const opponent=isHome?at.replace('Philadelphia ',''):ht.replace('Philadelphia ','');
      const philliesScore=isHome?hs:as_, oppScore=isHome?as_:hs;
      let gameTimeUTC='18:00:00';
      if (g.gameDate) gameTimeUTC=g.gameDate.split('T')[1]?.replace('Z','')||'18:00:00';
      let inningStr='';
      if (inProgress&&g.linescore){const inn=g.linescore.currentInning||'',half=g.linescore.inningHalf||'';if(inn)inningStr=`${half==='Top'?'Top':'Bot'} ${inn}${inn===1?'st':inn===2?'nd':inn===3?'rd':'th'}`;}
      const philliesProbable=isHome?(g.teams.home.probablePitcher?.fullName||null):(g.teams.away.probablePitcher?.fullName||null);
      const oppProbable=isHome?(g.teams.away.probablePitcher?.fullName||null):(g.teams.home.probablePitcher?.fullName||null);
      const philliesProbableId=isHome?(g.teams.home.probablePitcher?.id||null):(g.teams.away.probablePitcher?.id||null);
      const oppProbableId=isHome?(g.teams.away.probablePitcher?.id||null):(g.teams.home.probablePitcher?.id||null);
      const ls=g.linescore?{innings:g.linescore.innings||[],awayHits:g.linescore.teams?.away?.hits,homeHits:g.linescore.teams?.home?.hits,awayErrors:g.linescore.teams?.away?.errors,homeErrors:g.linescore.teams?.home?.errors}:null;
      games.push({gamePk:g.gamePk,h:ht,a:at,d:dateObj.date,t:gameTimeUTC,broadcasts,tv:broadcasts[0]||'TBD',hs,as:as_,isHome,opponent,phillies:philliesScore,opp:oppScore,played,inProgress,postponed,status:detail,inningStr,venue:g.venue?.name||(isHome?'Citizens Bank Park':opponent),philliesProbable,oppProbable,philliesProbableId,oppProbableId,ls});
    }
  }
  return games.sort((a,b)=>(a.d+a.t)>(b.d+b.t)?1:-1);
}
function parseStandings(data) {
  const out=[];
  for (const rec of (data.records||[])) {
    for (const tr of (rec.teamRecords||[])) out.push({
      teamId:tr.team.id,
      name:tr.team.name.replace('Philadelphia ',''),
      wins:tr.wins, losses:tr.losses, pct:tr.winningPercentage,
      gb:tr.gamesBack, divGb:tr.divisionGamesBack||tr.gamesBack,
      wcGb:tr.wildCardGamesBack||'—',
      divisionId:rec.division?.id, divisionName:rec.division?.name||'',
      leagueId:rec.league?.id, leagueName:rec.league?.name||'',
      divRank:parseInt(tr.divisionRank)||99,
      wcRank:parseInt(tr.wildCardRank)||99,
      isDivLeader:tr.divisionRank==='1',
      isPhillies:tr.team.id===PHILLIES_ID,
    });
  }
  return out;
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
function pt(d,t) {
  try {
    const dt=new Date(`${d}T${t||'18:00:00'}Z`), tz={timeZone:'America/New_York'};
    return {date:dt.toLocaleDateString('en-US',{...tz,weekday:'short',month:'short',day:'numeric'}),time:dt.toLocaleTimeString('en-US',{...tz,hour:'numeric',minute:'2-digit',timeZoneName:'short'}),timeShort:dt.toLocaleTimeString('en-US',{...tz,hour:'numeric',minute:'2-digit'}),short:dt.toLocaleDateString('en-US',{...tz,month:'short',day:'numeric'}),ms:dt.getTime()};
  } catch { return {date:d,time:'TBD',timeShort:'TBD',short:d,ms:0}; }
}
function todayStr(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});}
function nextGame() {
  const live=ALL.find(g=>g.inProgress); if(live) return live;
  const now=Date.now();
  return ALL.find(g=>!g.played&&!g.postponed&&new Date(`${g.d}T${g.t}Z`).getTime()>now-10800000)||ALL.filter(g=>g.played).slice(-1)[0]||ALL[0];
}
function seriesGroups() {
  const gs=[]; let cur=null;
  for (const g of ALL){if(!cur||cur.opp!==g.opponent){cur={opp:g.opponent,games:[]};gs.push(cur);}cur.games.push(g);}
  return gs;
}
function seriesResult(games) {
  const done=games.filter(g=>g.played);
  const isLive=games.some(g=>g.inProgress);
  const allDone=done.length===games.length&&!isLive;
  if (!done.length&&!isLive) return 'upcoming';
  const w=done.filter(g=>g.phillies>g.opp).length,l=done.filter(g=>g.phillies<g.opp).length;
  if (allDone){if(w===done.length)return 'sweep';if(l===done.length)return 'swept';if(w>l)return 'won';if(l>w)return 'lost';return 'split';}
  if(w>l) return 'live-winning';
  if(l>w) return 'live-losing';
  return 'live';
}

async function loadWeather(g){
  if(WEATHER_CACHE[g.gamePk]!==undefined) return;
  WEATHER_CACHE[g.gamePk]=null; // mark loading
  const coords=BALLPARK_COORDS[g.venue]||(g.isHome?[39.9056,-75.1665]:TEAM_COORDS[g.opponent]);
  if(!coords){renderTab('next');return;}
  const[lat,lon]=coords;
  const isToday=g.d===todayStr();
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      +(isToday?`&current=temperature_2m,weathercode,precipitation`:'')
      +`&hourly=temperature_2m,weathercode,precipitation_probability&temperature_unit=fahrenheit&timezone=auto&start_date=${g.d}&end_date=${g.d}`;
    const res=await fetch(url);
    const data=await res.json();
    if(!data.hourly){renderTab('next');return;}
    const tz=data.timezone||'America/New_York';
    const gameMsUTC=new Date(`${g.d}T${g.t}Z`).getTime();
    const localHourStr=new Date(gameMsUTC).toLocaleString('en-US',{hour:'2-digit',hour12:false,timeZone:tz});
    const gameHour=parseInt(localHourStr);
    const hourIdx=data.hourly.time.findIndex(t=>parseInt(t.split('T')[1])===gameHour);
    const i=hourIdx>=0?hourIdx:18;
    const forecast={temp:Math.round(data.hourly.temperature_2m[i]),code:data.hourly.weathercode[i],precip:data.hourly.precipitation_probability[i]};
    const current=isToday&&data.current
      ?{temp:Math.round(data.current.temperature_2m),code:data.current.weathercode}
      :null;
    WEATHER_CACHE[g.gamePk]={forecast,current};
  }catch(e){WEATHER_CACHE[g.gamePk]=null;}
  renderTab('next');
}

async function loadLiveBox(gamePk) {

  if(!LIVE_STATS_GAME||LIVE_STATS_GAME.gamePk!==gamePk) LIVE_STATS_GAME=ALL.find(g=>g.gamePk===gamePk)||null;
  try {
    const [boxR,feedR]=await Promise.all([
      fetch(`${MLB_API}/game/${gamePk}/boxscore`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live?fields=liveData,plays,allPlays,scoringPlays,result,description,about,inning,halfInning,homeScore,awayScore`).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    LIVE_BOX=boxR; LIVE_PLAYS_DATA=feedR; liveBoxLoaded=true;
  } catch(e){console.error('live box error',e);}
  // Update body without full re-render
  if(liveStatsOpen){
    const body=document.getElementById('live-stats-body');
    if(body) body.innerHTML=buildLiveStatsBodyHtml();
    else renderTab('next');
  } else if(liveBoxLoaded&&LIVE_STATS_GAME?.played){
    // Background pre-fetch finished for a completed game — auto-open the recap
    liveStatsOpen=true;
    renderTab('next');
  }
}

        <div class="ab-cnt-lbl">Balls</div>

      </div>
      <div class="ab-count-item">
        <div class="ab-cnt-lbl">Strikes</div>
        <div class="ab-cnt-val strikes">${strikes}</div>
        <div class="ab-pips">${strikePips}</div>
      </div>
      <div class="ab-count-item">
        <div class="ab-cnt-lbl">Outs</div>

  </div>`;
}

// ─── NEXT GAME ─────────────────────────────────────────────────────────────
function renderNext() {
  if (!ALL.length) return '<div class="loading">No schedule data.</div>';
  const td=todayStr(), isDefaultView=viewingGameIdx===null;
  const idx=getViewingIdx(), g=ALL[idx]||nextGame();
  if(!g) return '<div class="loading">No schedule data.</div>';
  const {date,time,ms}=pt(g.d,g.t);
  const ti=teamInfo(g.opponent);
  const navLabel=`${date} · ${g.isHome?'vs':'@'} ${g.opponent}`;

  const navBar=`<div class="ng-nav">
    <button class="ng-nav-btn" onclick="navGame(-1)" ${idx===0?'disabled':''}>‹ Prev</button>
    <span class="ng-nav-label">${navLabel}</span>
    <button class="ng-nav-btn" onclick="navGame(1)" ${idx===ALL.length-1?'disabled':''}>Next ›</button>
  </div>`;


  const psStatRow=(id)=>{
    const s=id?PITCHER_STATS[id]:null;
    if(!s) return pitcherStatsOpen?`<div class="ps-loading">Loading…</div>`:'';
    return`<div class="ps-stats"><span class="ps-hand ${s.hand==='L'?'lhp':'rhp'}">${s.hand}HP</span><span class="ps-stat"><span class="ps-lbl">ERA</span>${s.era}</span><span class="ps-stat"><span class="ps-lbl">W-L</span>${s.wins}-${s.losses}</span><span class="ps-stat"><span class="ps-lbl">K</span>${s.strikeOuts}</span></div>`;
  };
  const pitcherCard=`<div class="pitchers-card">
    <div class="pitchers-card-top">
      <div class="pitcher-side"><div class="pitcher-lbl">⚾ PHI Starter</div><div class="pitcher-name phi">${g.philliesProbable||'<span class="tbd">TBD</span>'}</div></div>
      <div class="pitcher-divider">vs</div>
      <div class="pitcher-side"><div class="pitcher-lbl">⚾ ${ti.a} Starter</div><div class="pitcher-name">${g.oppProbable||'<span class="tbd">TBD</span>'}</div></div>
    </div>
    <button class="ps-toggle-btn" onclick="togglePitcherStats()">${pitcherStatsOpen?'▲ Hide':'▼ Pitcher Stats'}</button>
    ${pitcherStatsOpen?`<div class="ps-expand">
      <div class="ps-col">${psStatRow(g.philliesProbableId)}</div>
      <div class="ps-col-gap"></div>
      <div class="ps-col">${psStatRow(g.oppProbableId)}</div>
    </div>`:''}

  </div>`;

  const metaGrid=`<div class="ng-meta">
    <div class="ng-meta-item"><div class="ng-meta-lbl">🕐 First Pitch</div><div class="ng-meta-val">${time}</div></div>
    <div class="ng-meta-item"><div class="ng-meta-lbl">🏟️ Venue</div><div class="ng-meta-val">${g.venue||'—'}</div></div>
  </div>`;

  const tvRows=g.broadcasts.length
    ?g.broadcasts.map(b=>{const info=getBc(b);if(!info)return'';return`<a class="info-row" href="${info.url}" target="_blank" rel="noopener"><div class="ir-icon">${info.icon}</div><div><div class="ir-title">${info.display}</div><div class="ir-sub">${info.stream}</div><div class="ir-url">${info.url.replace('https://','')}</div></div><span class="ir-badge ${info.type}">${info.type==='free'?'Free':'Sub'}</span><span class="ir-arrow">↗</span></a>`;}).join('')
    :`<div class="info-row"><div class="ir-icon">📺</div><div><div class="ir-title">TBD</div><div class="ir-sub">Check ESPN app closer to game time</div></div></div>`;
  const radioRows=RADIO.map(r=>`<a class="info-row" href="${r.url}" target="_blank" rel="noopener"><div class="ir-icon">${r.i}</div><div><div class="ir-title">${r.n}</div><div class="ir-sub">${r.d}</div><div class="ir-url">${r.url.replace('https://','')}</div></div><span class="ir-arrow">↗</span></a>`).join('');
  const watchSection=`<div class="section-label">📺 Watch Online</div>${tvRows}<div class="section-label">📻 Listen Live</div>${radioRows}`;

  // ── PRE-GAME ──
  if (!g.played && !g.inProgress) {
    // Weather
    if(WEATHER_CACHE[g.gamePk]===undefined) loadWeather(g);
    const wxData=WEATHER_CACHE[g.gamePk];
    const wxEntry=(label,w,showPrecip=false)=>
      `<div class="wx-entry">
        <span class="wx-lbl">${label}</span>
        <span class="wx-icon">${wmoEmoji(w.code)}</span>
        <span class="wx-temp">${w.temp}°F</span>
        <span class="wx-desc">${wmoDesc(w.code)}</span>
        ${showPrecip&&w.precip>10?`<span class="wx-precip">💧 ${w.precip}% rain</span>`:''}
      </div>`;
    const weatherBar=wxData
      ?`<div class="wx-bar">
          ${wxData.current?wxEntry('Now',wxData.current):''}
          ${wxData.current&&wxData.forecast?'<div class="wx-divider"></div>':''}
          ${wxData.forecast?wxEntry('First Pitch',wxData.forecast,true):''}
        </div>`
      :'';

    const cdBlock=isDefaultView&&ms>Date.now()+60000?`<div class="countdown" style="margin-top:14px"><div class="cd-lbl">⏱ Time Until First Pitch</div><div class="cd-time" id="cdtime">—</div></div>`:'';
    const heroBlock=`<div class="ng-hero">
      <div class="ng-label">${g.postponed?'⚠️ Postponed':'Next Game'}</div>
      <div class="ng-matchup">
        ${g.isHome
          ?`<div class="ng-team"><span class="ng-emoji">${ti.e}</span><div class="ng-tname">${g.opponent}</div></div>
            <div class="ng-vs">@</div>
            <div class="ng-team"><span class="ng-emoji">🔔</span><div class="ng-tname phils">Phillies</div></div>`
          :`<div class="ng-team"><span class="ng-emoji">🔔</span><div class="ng-tname phils">Phillies</div></div>
            <div class="ng-vs">@</div>
            <div class="ng-team"><span class="ng-emoji">${ti.e}</span><div class="ng-tname">${g.opponent}</div></div>`}
      </div>
      ${cdBlock}
    </div>`;
    return navBar+heroBlock+pitcherCard+metaGrid+weatherBar+watchSection;
  }

  // ── LIVE / FINAL ──
  const phW=g.phillies>g.opp, oppW=g.opp>g.phillies;
  const phiSide=`<div class="score-side"><div class="score-num ${phW?'ahead':oppW?'behind':'tied-c'}">${g.phillies}</div><div class="score-lbl">PHI</div></div>`;
  const oppSide=`<div class="score-side"><div class="score-num ${oppW?'ahead':phW?'behind':'tied-c'}">${g.opp}</div><div class="score-lbl">${ti.a}</div></div>`;
  const scoreBlock=`<div class="score-block">
    ${g.isHome?oppSide:phiSide}
    <div class="score-divider"></div>
    ${g.isHome?phiSide:oppSide}
  </div>
  <div class="score-status-row">${g.inProgress?`<span class="live-dot"></span>${g.inningStr||'In Progress'}`:`Final · ${phW?'✅ Win':'❌ Loss'}`}</div>`;

  const heroBlock=`<div class="ng-hero">
    <div class="ng-label">${g.inProgress?'<span class="live-dot"></span>Live Now':'Final'}</div>
    <div class="ng-matchup">
      ${g.isHome
        ?`<div class="ng-team"><span class="ng-emoji">${ti.e}</span><div class="ng-tname">${g.opponent}</div></div>
           <div class="ng-vs">@</div>
           <div class="ng-team"><span class="ng-emoji">🔔</span><div class="ng-tname phils">Phillies</div></div>`
        :`<div class="ng-team"><span class="ng-emoji">🔔</span><div class="ng-tname phils">Phillies</div></div>
           <div class="ng-vs">@</div>
           <div class="ng-team"><span class="ng-emoji">${ti.e}</span><div class="ng-tname">${g.opponent}</div></div>`}
    </div>
    ${scoreBlock}
  </div>`;

  const linescore=renderLinescore(g);
  const inningTracker=g.inProgress?renderInningTracker(g):'';
  const statsPanel=(g.inProgress||g.played)?renderLiveStatsCard(g):'';

  // Live game: show current weather only
  let liveWeatherBar='';
  if(g.inProgress){
    if(WEATHER_CACHE[g.gamePk]===undefined) loadWeather(g);
    const wxData=WEATHER_CACHE[g.gamePk];
    if(wxData?.current){
      liveWeatherBar=`<div class="wx-bar wx-compact">
        <div class="wx-entry">
          <span class="wx-lbl">Now at Ballpark</span>
          <span class="wx-icon">${wmoEmoji(wxData.current.code)}</span>
          <span class="wx-temp">${wxData.current.temp}°F</span>
          <span class="wx-desc">${wmoDesc(wxData.current.code)}</span>
        </div>
      </div>`;
    }
  }

  return navBar+heroBlock+linescore+inningTracker+liveWeatherBar+statsPanel+(g.played?'':pitcherCard+metaGrid+watchSection);
}

function startCd(ms) {
  if (cdTimer) clearInterval(cdTimer);
  const tick=()=>{const el=document.getElementById('cdtime');if(!el){clearInterval(cdTimer);return;}const d=ms-Date.now();if(d<=0){el.textContent='Starting soon…';clearInterval(cdTimer);return;}const dy=Math.floor(d/86400000),h=Math.floor((d%86400000)/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);el.textContent=dy>0?`${dy}d ${h}h ${m}m`:`${h}h ${m}m ${s}s`;};
  tick(); cdTimer=setInterval(tick,1000);
}

// ─── SCHEDULE ──────────────────────────────────────────────────────────────
function renderSchedule() {
  const now=Date.now(),dayMs=86400000,cutoff=now+8*dayMs;
  const todayStr=new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});
  let weekGames=ALL.filter(g=>{const gms=new Date(`${g.d}T${g.t}Z`).getTime();return(gms<cutoff&&gms>now-dayMs)||g.inProgress||g.d===todayStr;});
  if (!weekGames.length){const ng=ALL.find(g=>!g.played&&!g.inProgress);weekGames=ng?ALL.slice(ALL.indexOf(ng),ALL.indexOf(ng)+6):[];if(!weekGames.length)return'<div class="no-games">No upcoming games found.</div>';}
  const hdr=weekGames.some(g=>g.d===todayStr)?'This Week':'Next Games';

  const cards=weekGames.map(g=>{
    const {date,time}=pt(g.d,g.t),ti=teamInfo(g.opponent),today=g.d===todayStr;
    let pillHtml='',cardCls='',resultHtml='';
    if(g.inProgress){pillHtml=`<span class="sc-pill live-p"><span class="live-dot"></span>${g.inningStr||'Live'}</span>`;cardCls='live';if(g.phillies!=null)resultHtml=`<div class="sc-final lv">${g.phillies}–${g.opp}</div>`;}
    else if(g.played){const w=g.phillies>g.opp;pillHtml=`<span class="sc-pill ${w?'win-p':'loss-p'}">${w?'W':'L'} ${g.phillies}–${g.opp}</span>`;resultHtml=`<div class="sc-final ${w?'w':'l'}">${w?'W':'L'} ${g.phillies}–${g.opp}</div>`;}
    else if(g.postponed){pillHtml=`<span class="sc-pill sched">PPD</span>`;}
    else{pillHtml=`<span class="sc-pill sched">${time}</span>`;if(today)cardCls='today';}
    const tvText=g.broadcasts.length?g.broadcasts.map(b=>{const info=getBc(b);return info?`${info.icon} <strong>${info.display}</strong> — ${info.stream}`:b;}).join('<br>'):'📺 TBD';
    const radioText=RADIO.map(r=>`${r.i} ${r.n}`).join(' &nbsp;·&nbsp; ');
    return`<div class="sc-card ${cardCls}">
      <div class="sc-hdr"><span class="sc-hdr-date">${date}</span>${pillHtml}</div>
      <div class="sc-body">
        <div class="sc-matchup">
          <span class="sc-team-emoji">${ti.e}</span>
          <div><div class="sc-opp-name">${g.isHome?'vs ':'@ '}${g.opponent}</div><div class="sc-ha">${g.isHome?'🏠 Home':'✈️ Away'}</div></div>
          ${resultHtml}
        </div>
        ${(g.philliesProbable||g.oppProbable)?`<div class="sc-pitchers">⚾ <span>${g.philliesProbable||'TBD'}</span> vs <span>${g.oppProbable||'TBD'}</span></div>`:''}
        <div class="sc-info-row">${tvText}</div>
        <div class="sc-info-row" style="margin-top:2px">${radioText}</div>
        <div class="sc-venue">🏟 ${g.venue}</div>
      </div>
    </div>`;
  }).join('');

  const allPlayed=ALL.filter(x=>x.played);
  const last10=allPlayed.slice(-10);
  let streakLen=0,streakType='';
  if(allPlayed.length){const lx=allPlayed[allPlayed.length-1];streakType=lx.phillies>lx.opp?'W':'L';for(let i=allPlayed.length-1;i>=0;i--){const isW=allPlayed[i].phillies>allPlayed[i].opp;if((streakType==='W'&&isW)||(streakType==='L'&&!isW))streakLen++;else break;}}
  const w10=last10.filter(x=>x.phillies>x.opp).length;
  const streakHtml=last10.length?`<div class="streak-card">
    <div class="streak-header">
      <span class="streak-lbl">Last ${last10.length} Games</span>
      ${streakLen?`<span class="streak-badge s${streakType.toLowerCase()}">${streakType}${streakLen} Streak</span>`:''}
    </div>
    <div class="streak-pills-row">${last10.map(x=>{const w=x.phillies>x.opp;return`<div class="pill ${w?'w':'l'}" title="${pt(x.d,x.t).short} vs ${x.opponent}: ${x.phillies}–${x.opp}">${w?'W':'L'}</div>`;}).join('')}</div>
    <div class="streak-footer"><strong>${w10}–${last10.length-w10}</strong> in last ${last10.length}</div>
  </div>`:'';
  return`${streakHtml}<div class="week-hdr"><span>⚾</span>${hdr}</div>${cards}`;
}

// ─── SERIES TRACKER ────────────────────────────────────────────────────────
function renderSeries() {
  const grps=seriesGroups(),played=ALL.filter(g=>g.played);
  const wins=played.filter(g=>g.phillies>g.opp).length,losses=played.filter(g=>g.phillies<g.opp).length;
  const gPlayed=wins+losses;
  let sw=0,sl=0,ss=0;
  for(const grp of grps){const r=seriesResult(grp.games);const done=grp.games.every(x=>x.played||x.inProgress);if(!done&&r!=='live')continue;if(r==='won'||r==='sweep')sw++;else if(r==='lost'||r==='swept')sl++;else if(r==='split')ss++;}
  const tot=sw+sl+ss,pct=tot>0?(sw/tot*100).toFixed(1)+'%':'—';

  const finalResults=new Set(['won','lost','sweep','swept','split']);
  const pills=grps.filter(g=>finalResults.has(seriesResult(g.games))).slice(-12).map(grp=>{const r=seriesResult(grp.games);const cls=(r==='won'||r==='sweep')?'w':(r==='lost'||r==='swept')?'l':'s';const lbl=(r==='won'||r==='sweep')?'W':(r==='lost'||r==='swept')?'L':'S';return`<div class="pill ${cls}">${lbl}</div>`;}).join('');

  // Pace
  let paceHtml='';
  if(gPlayed>0){const wp=wins/gPlayed,rem=162-gPlayed,pW=Math.round(162*wp),pL=162-pW,half=Math.round(rem/2),p5W=wins+half,p5L=losses+(rem-half);
    paceHtml=`<div class="pace-row">
      <div class="pace-box"><div class="pace-lbl">📈 Season Pace</div><div class="pace-num"><span class="pw">${pW}</span><span class="pd">–</span><span class="pl">${pL}</span></div><div class="pace-sub">at ${(wp*100).toFixed(1)}% win rate</div></div>
      <div class="pace-box"><div class="pace-lbl">⚖️ .500 Pace</div><div class="pace-num"><span class="pw">${p5W}</span><span class="pd">–</span><span class="pl">${p5L}</span></div><div class="pace-sub">.500 rest of ${rem} games</div></div>
    </div>`;}

  // Standings (NL East only in series tab)
  let stdHtml='';
  const nle=STANDINGS.filter(t=>t.divisionId===204).sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));
  if(nle.length){
    stdHtml=`<div class="std-wrap">
      <div class="std-header">NL East<div class="std-header-cols"><span class="std-header-col">W-L</span><span class="std-header-col">PCT</span><span class="std-header-col">GB</span></div></div>
      ${nle.map((t,i)=>{const ti=teamInfo(t.name);return`<div class="std-row ${t.isPhillies?'phils':''}"><span class="std-pos">${i+1}</span><span class="std-emoji">${ti.e}</span><span class="std-name">${t.name}</span><span class="std-wl">${t.wins}-${t.losses}</span><span class="std-pct">${t.pct}</span><span class="std-gb">${i===0?'—':t.divGb}</span></div>`;}).join('')}
    </div>`;}

  // Season grid
  const resCls=r=>({won:'won',sweep:'sweep',lost:'lost',swept:'swept',split:'split',live:'live','live-winning':'live-winning','live-losing':'live-losing',upcoming:'upcoming'})[r]||'upcoming';
  const resLbl=r=>({won:'W',sweep:'🧹',lost:'L',swept:'🧹',split:'S',live:'●','live-winning':'●','live-losing':'●',upcoming:'·'})[r]||'·';
  const gridTiles=grps.map((grp,i)=>{const r=seriesResult(grp.games),rc=resCls(r),ti=teamInfo(grp.opp);return`<button class="sg-tile ${rc}" onclick="jumpToSeries(${i})" title="${grp.opp}"><span class="sg-emoji">${ti.e}</span><span class="sg-abbr">${ti.a}</span><span class="sg-res">${resLbl(r)}</span></button>`;}).join('');

  // Series rows (full season)
  const rowCls=r=>({won:'won',sweep:'sweep',lost:'lost',swept:'swept',split:'split',live:'live-r','live-winning':'live-winning-r','live-losing':'live-losing-r',upcoming:'upcoming'})[r]||'upcoming';
  const badgeLbl=r=>({won:'WON',sweep:'🧹 SWEEP',lost:'LOST',swept:'🧹 SWEPT',split:'SPLIT',live:'● LIVE','live-winning':'● LIVE','live-losing':'● LIVE',upcoming:'UPCOMING'})[r]||'';
  const seriesRows=grps.map((grp,idx)=>{
    const res=seriesResult(grp.games),rc=rowCls(res);
    const first=grp.games[0],lastG=grp.games[grp.games.length-1];
    const dr=`${pt(first.d,first.t).short}${grp.games.length>1?' – '+pt(lastG.d,lastG.t).short:''}`;
    const ti=teamInfo(grp.opp);
    const nG=grp.games.length;
    const cols=grp.games.map((g,gi)=>{
      if(g.inProgress&&g.phillies!=null){const pa=g.phillies>=g.opp;return`<div class="sr-game"><div class="sr-g-lbl">G${gi+1}</div><div class="sr-g-line ${pa?'row-win':''}"><span class="sr-g-abbr p">PHI</span><span class="sr-g-score live-s">${g.phillies}</span></div><div class="sr-g-line ${!pa?'row-win':''}"><span class="sr-g-abbr o">${ti.a}</span><span class="sr-g-score live-s">${g.opp}</span></div><div class="sr-g-result lv">LIVE</div></div>`;}
      if(g.played&&g.phillies!=null){const phiW=g.phillies>g.opp;const tv=g.broadcasts.length?getBc(g.broadcasts[0]):null;return`<div class="sr-game"><div class="sr-g-lbl">G${gi+1}</div><div class="sr-g-line ${phiW?'row-win':''}"><span class="sr-g-abbr p ${phiW?'phi-win':'phi-loss'}">PHI</span><span class="sr-g-score ${phiW?'win':'lose'}">${g.phillies}</span></div><div class="sr-g-line ${!phiW?'row-win':''}"><span class="sr-g-abbr o">${ti.a}</span><span class="sr-g-score opp-score">${g.opp}</span></div><div class="sr-g-result ${phiW?'w':'l'}">${phiW?'WIN':'LOSS'}</div>${tv?`<div class="sr-g-tv">${tv.display.replace('NBC Sports Philly','NBCSP')}</div>`:''}</div>`;}
      if(g.postponed)return`<div class="sr-game"><div class="sr-g-lbl">G${gi+1}</div><div class="sr-g-score u">PPD</div></div>`;
      const {timeShort,short}=pt(g.d,g.t);const tv=g.broadcasts.length?getBc(g.broadcasts[0]):null;
      return`<div class="sr-game"><div class="sr-g-lbl">G${gi+1}</div><div class="sr-g-line"><span class="sr-g-abbr o" style="font-size:.44rem">${short}</span></div><div class="sr-g-score u">${timeShort}</div>${tv?`<div class="sr-g-tv">${tv.display.replace('NBC Sports Philly','NBCSP')}</div>`:''}</div>`;
    }).join('');
    return`<div class="sr-row ${rc}" id="sr-${idx}">
      <div class="sr-left">
        <span class="sr-badge ${rc}">${badgeLbl(res)}</span>
        <div class="sr-opp-info"><span class="sr-team-emoji">${ti.e}</span><span class="sr-opp-name">${grp.opp}</span></div>
        <span class="sr-ha">${first.isHome?'🏠 Home':'✈️ Away'}</span>
        <span class="sr-dates">${dr}</span>
        <span class="sr-gc">${nG}G series</span>
      </div>
      <div class="sr-right">${cols}</div>
    </div>`;
  }).join('');

  const winPctDisplay=gPlayed>0?(wins/gPlayed*100).toFixed(1)+'%':'—';
  return`
    <div class="sr-top">
      <div class="sr-top-title">2026 Season</div>
      <div class="sr-counts">
        <div class="sr-cbox"><div class="sr-cnum g">${wins}</div><div class="sr-clbl">Wins</div></div>
        <div class="sr-cbox"><div class="sr-cnum r">${losses}</div><div class="sr-clbl">Losses</div></div>
        <div class="sr-cbox"><div class="sr-cnum y">${winPctDisplay}</div><div class="sr-clbl">Win %</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
        <div style="background:var(--s2);border:1px solid var(--s3);border-radius:var(--r-sm);padding:8px;text-align:center">

// ─── DEEP STATS ─────────────────────────────────────────────────────────────
let PITCH_PLAYERS=null, HIT_STATS_D=null, deepLoaded=false, deepOpen=false;

function ipDec(ip){const[f,r='0']=String(ip||0).split('.');return parseInt(f)+parseInt(r)/3;}
function calcEra(ps){const er=ps.reduce((s,p)=>s+(+p.stat.earnedRuns||0),0),ip=ps.reduce((s,p)=>s+ipDec(p.stat.inningsPitched),0);return ip>0?(er/ip*9).toFixed(2):'—';}
function calcWhip(ps){const hbb=ps.reduce((s,p)=>s+(+p.stat.hits||0)+(+p.stat.baseOnBalls||0),0),ip=ps.reduce((s,p)=>s+ipDec(p.stat.inningsPitched),0);return ip>0?(hbb/ip).toFixed(2):'—';}

async function loadDeepStats() {
  if(deepLoaded) return;
  try {
    const [pd,hd]=await Promise.all([
      fetch(`${MLB_API}/stats?stats=season&group=pitching&teamId=${PHILLIES_ID}&season=${SEASON}&gameType=R&playerPool=All&limit=100`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`${MLB_API}/teams/${PHILLIES_ID}/stats?stats=season&group=hitting&season=${SEASON}&gameType=R`).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    PITCH_PLAYERS=pd?.stats?.[0]?.splits||null;
    HIT_STATS_D=hd?.stats?.[0]?.splits?.[0]?.stat||null;
    deepLoaded=true;
  } catch(e){console.error(e);}
  renderDeepBody();
}

function renderDeepBody() {
  const el=document.getElementById('ds-body'); if(!el) return;
  const played=ALL.filter(g=>g.played), gp=played.length;
  if(!gp){el.innerHTML='<div style="color:var(--t4);font-size:.68rem;text-align:center;padding:12px">No games played yet.</div>';return;}

  const rs=played.reduce((s,g)=>s+(g.phillies||0),0);
  const ra=played.reduce((s,g)=>s+(g.opp||0),0);
  const homeW=played.filter(g=>g.isHome&&g.phillies>g.opp).length, homeL=played.filter(g=>g.isHome&&g.phillies<g.opp).length;
  const awayW=played.filter(g=>!g.isHome&&g.phillies>g.opp).length, awayL=played.filter(g=>!g.isHome&&g.phillies<g.opp).length;
  const oneW=played.filter(g=>Math.abs(g.phillies-g.opp)===1&&g.phillies>g.opp).length, oneL=played.filter(g=>Math.abs(g.phillies-g.opp)===1&&g.phillies<g.opp).length;
  const blowW=played.filter(g=>(g.phillies-g.opp)>=5).length, blowL=played.filter(g=>(g.opp-g.phillies)>=5).length;
  const shutW=played.filter(g=>g.phillies>0&&g.opp===0).length, shutL=played.filter(g=>g.opp>0&&g.phillies===0).length;

  const rec=(w,l)=>`<span style="color:var(--win)">${w}</span><span style="color:var(--t4)"> – </span><span style="color:var(--loss)">${l}</span>`;
  const row=(lbl,val,sub='')=>`<div class="ds-row"><span class="ds-lbl">${lbl}</span><span class="ds-val">${val}${sub?`<span class="ds-sub">${sub}</span>`:''}</span></div>`;
  const diff=rs-ra; const diffStr=(diff>0?'+':'')+diff;

  // Pitching splits from player data
  let spEra='—',rpEra='—',spWhip='—',rpWhip='—';
  if(PITCH_PLAYERS) {
    const sp=PITCH_PLAYERS.filter(p=>(+p.stat.gamesStarted||0)/(+p.stat.gamesPlayed||1)>=0.5&&(+p.stat.gamesStarted||0)>=1);
    const rp=PITCH_PLAYERS.filter(p=>(+p.stat.gamesStarted||0)===0||(+p.stat.gamesStarted||0)/(+p.stat.gamesPlayed||1)<0.25);
    spEra=calcEra(sp); rpEra=calcEra(rp);
    spWhip=calcWhip(sp); rpWhip=calcWhip(rp);
  }

  // Hitting
  const avg=HIT_STATS_D?.avg||'—', ops=HIT_STATS_D?.ops||'—', slg=HIT_STATS_D?.slg||'—', obp=HIT_STATS_D?.obp||'—';

  el.innerHTML=`
    <div class="ds-section">Scoring</div>
    ${row('Runs/game scored',(rs/gp).toFixed(2))}
    ${row('Runs/game allowed',(ra/gp).toFixed(2))}
    ${row('Run differential',`<span style="color:${diff>=0?'var(--win)':'var(--loss)'}">${diffStr}</span>`,`${rs} R – ${ra} RA`)}
    <div class="ds-section">Splits</div>
    ${row('Home',rec(homeW,homeL))}
    ${row('Away',rec(awayW,awayL))}
    ${row('1-run games',rec(oneW,oneL))}
    ${row('Blowouts (5+ run margin)',rec(blowW,blowL))}
    ${row('Shutouts for / against',rec(shutW,shutL))}
    <div class="ds-section">Starting Pitching</div>
    ${row('Starters ERA',spEra)}
    ${row('Starters WHIP',spWhip)}
    <div class="ds-section">Bullpen</div>
    ${row('Bullpen ERA',rpEra)}
    ${row('Bullpen WHIP',rpWhip)}
    <div class="ds-section">Hitting</div>
    ${row('Team batting avg',avg)}
    ${row('On-base pct',obp)}
    ${row('Slugging',slg)}
    ${row('OPS',ops)}
    ${!deepLoaded?'<div style="color:var(--t4);font-size:.58rem;margin-top:8px;text-align:center">Pitching & hitting stats loading…</div>':''}
  `;
}

function toggleDeepStats() {
  deepOpen=!deepOpen;
  const body=document.getElementById('ds-body'), btn=document.getElementById('ds-btn');
  if(!body||!btn) return;
  body.style.display=deepOpen?'block':'none';
  btn.textContent=deepOpen?'📊 Deep Stats ▲':'📊 Deep Stats ▼';
  btn.classList.toggle('open',deepOpen);
  if(deepOpen){renderDeepBody();if(!deepLoaded)loadDeepStats();}
}

// ─── STANDINGS ─────────────────────────────────────────────────────────────
let stdFilter='division';
const DIV_ORDER=[204,205,203,201,202,200];
const DIV_NAMES={204:'NL East',205:'NL Central',203:'NL West',201:'AL East',202:'AL Central',200:'AL West'};

// Division header color themes
const DIV_BG={
  204:'linear-gradient(90deg,#6b0000 0%,#003087 100%)',       // NL East  — Phillies red+navy
  205:'linear-gradient(90deg,#0f2d1a 0%,#1a5c32 100%)',       // NL Central — forest green (Cardinals/Cubs vibe)
  203:'linear-gradient(90deg,#003087 0%,#1144aa 100%)',        // NL West  — Dodger blue
  201:'linear-gradient(90deg,#111120 0%,#1e1e3f 100%)',        // AL East  — pinstripe navy (Yankees)
  202:'linear-gradient(90deg,#4a1200 0%,#922600 100%)',        // AL Central — Tigers/White Sox orange-red
  200:'linear-gradient(90deg,#003d30 0%,#006652 100%)',        // AL West  — Mariners/A's teal
};
const DIV_ACCENT={
  204:'#7EB4D8', 205:'#86efac', 203:'#93c5fd',
  201:'#c4b5fd', 202:'#fdba74', 200:'#6ee7b7',
};
const LG_BG={
  104:'linear-gradient(90deg,#6b0000 0%,#003087 100%)',        // NL — red+navy
  103:'linear-gradient(90deg,#111120 0%,#1e3a5f 100%)',        // AL — slate blue
};
const LG_ACCENT={104:'#7EB4D8',103:'#93c5fd'};

function stdHdr(bg,accent,label,colHdr='<span class="std-header-col">W-L</span><span class="std-header-col">PCT</span><span class="std-header-col">GB</span>'){
  return`<div class="std-header" style="background:${bg};color:${accent}">${label}<div class="std-header-cols" style="opacity:.75">${colHdr}</div></div>`;
}

function renderStandings() {
  if(!STANDINGS.length) return '<div class="loading">No standings data yet.</div>';
  const filtersHtml=`<div class="std-sub-tabs">
    <button class="std-sub-btn ${stdFilter==='division'?'active':''}" onclick="setStdFilter('division')">Division</button>
    <button class="std-sub-btn ${stdFilter==='league'?'active':''}" onclick="setStdFilter('league')">League</button>
    <button class="std-sub-btn ${stdFilter==='wildcard'?'active':''}" onclick="setStdFilter('wildcard')">Wild Card</button>
  </div>`;

  function tRow(t,i,gbVal,firstSuffix) {
    const ti=teamInfo(t.name);
    const isFirst=i===0||!gbVal||gbVal==='-'||gbVal==='0.0'||gbVal==='0';
    return`<div class="std-row ${t.isPhillies?'phils':''}"><span class="std-pos">${i+1}</span><span class="std-emoji">${ti.e}</span><span class="std-name">${t.name}</span><span class="std-wl">${t.wins}-${t.losses}</span><span class="std-pct">${t.pct}</span><span class="std-gb">${isFirst?(firstSuffix||'—'):gbVal}</span></div>`;
  }

  let body='';
  if(stdFilter==='division') {
    for(const divId of DIV_ORDER) {
      const teams=STANDINGS.filter(t=>t.divisionId===divId).sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));
      if(!teams.length) continue;
      body+=`<div class="div-section"><div class="std-wrap">
        ${stdHdr(DIV_BG[divId],DIV_ACCENT[divId],DIV_NAMES[divId])}
        ${teams.map((t,i)=>tRow(t,i,t.divGb)).join('')}
      </div></div>`;
    }
  } else if(stdFilter==='league') {
    for(const [lgId,lgName] of [[104,'National League'],[103,'American League']]) {
      const teams=STANDINGS.filter(t=>t.leagueId===lgId).sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));
      if(!teams.length) continue;
      body+=`<div class="div-section"><div class="std-wrap">
        ${stdHdr(LG_BG[lgId],LG_ACCENT[lgId],lgName)}
        ${teams.map((t,i)=>tRow(t,i,t.gb)).join('')}
      </div></div>`;
    }
  } else {
    // Wild Card view — NL then AL
    for(const [lgId,lgName] of [[104,'NL'],[103,'AL']]) {
      const all=STANDINGS.filter(t=>t.leagueId===lgId);
      const leaders=all.filter(t=>t.isDivLeader).sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));
      const wcTeams=all.filter(t=>!t.isDivLeader).sort((a,b)=>{
        if(a.wcRank!==99&&b.wcRank!==99&&a.wcRank!==b.wcRank) return a.wcRank-b.wcRank;
        return parseFloat(b.pct)-parseFloat(a.pct);
      });
      const bg=LG_BG[lgId],ac=LG_ACCENT[lgId];
      body+=`<div class="div-section"><div class="std-wrap">
        ${stdHdr(bg,ac,lgName+' Division Leaders')}
        ${leaders.map((t,i)=>{const ti=teamInfo(t.name);return`<div class="std-row ${t.isPhillies?'phils':''}"><span class="std-pos" style="color:var(--win)">✓</span><span class="std-emoji">${ti.e}</span><span class="std-name">${t.name}<span class="div-ldr-mark"> ${DIV_NAMES[t.divisionId]?.split(' ').pop()}</span></span><span class="std-wl">${t.wins}-${t.losses}</span><span class="std-pct">${t.pct}</span><span class="std-gb">—</span></div>`;}).join('')}
      </div></div>
      <div class="div-section"><div class="std-wrap">
        ${stdHdr(bg,ac,lgName+' Wild Card Race','<span class="std-header-col">W-L</span><span class="std-header-col">PCT</span><span class="std-header-col">WC GB</span>')}
        ${wcTeams.map((t,i)=>{const ti=teamInfo(t.name);const inWc=i<3;const wcGb=t.wcGb;return`<div class="std-row ${t.isPhillies?'phils':''} ${inWc?'wc-in':''}"><span class="std-pos">${inWc?'W'+(i+1):(i+1)}</span><span class="std-emoji">${ti.e}</span><span class="std-name">${t.name}</span><span class="std-wl">${t.wins}-${t.losses}</span><span class="std-pct">${t.pct}</span><span class="std-gb">${i===0?'—':(!wcGb||wcGb==='—'?'—':wcGb)}</span></div>`;}).join('')}
      </div></div>`;
    }
  }
  return filtersHtml+body;
}
function setStdFilter(f){stdFilter=f;document.getElementById('standings-c').innerHTML=renderStandings();}

// ─── PLAYERS TAB ──────────────────────────────────────────────────────────────
let BAT_STATS=null, PIT_STATS_ALL=null, PLAYER_LOADED=false, PLAYER_LOADING=false;
let PLAYER_STREAKS={}; // playerId -> { hit:N, cold:N }
let ROSTER_STATUS={}; // playerId -> { description: "10-Day IL", code: "D10" }
let ROSTER_IDS=new Set(); // all player IDs currently on the 40-man roster
let plSubTab='offense';
let plSortOff={col:'ops',dir:-1}, plSortSp={col:'era',dir:1}, plSortBp={col:'era',dir:1};

function setPlSubTab(t){plSubTab=t;const el=document.getElementById('players-c');if(el)el.innerHTML=renderPlayers();}

function sortPl(tab,col){
  const s=tab==='offense'?plSortOff:tab==='starters'?plSortSp:plSortBp;
  if(s.col===col)s.dir=-s.dir;
  else{s.col=col;s.dir=(col==='era'||col==='whip')?1:-1;}
  const el=document.getElementById('players-c');if(el)el.innerHTML=renderPlayers();
}

// True IL = actually injured (10-Day, 15-Day, 60-Day)
function isILStatus(rs){ if(!rs) return false; const d=(rs.description||'').toLowerCase(); const c=rs.code||''; return d.includes('injur')||['D10','D15','D60','DL','IL10','IL15','IL60'].includes(c); }

async function loadPlayerStats(){
  if(PLAYER_LOADING)return; PLAYER_LOADING=true;
  try{
    const[bd,pd,rd]=await Promise.all([
      fetch(`${MLB_API}/stats?stats=season&group=hitting&teamId=${PHILLIES_ID}&season=${SEASON}&gameType=R&playerPool=All&limit=100`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`${MLB_API}/stats?stats=season&group=pitching&teamId=${PHILLIES_ID}&season=${SEASON}&gameType=R&playerPool=All&limit=100`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`${MLB_API}/teams/${PHILLIES_ID}/roster?rosterType=40Man&season=${SEASON}`).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    BAT_STATS=(bd?.stats?.[0]?.splits||[]).filter(p=>(p.stat.atBats||0)>0);
    PIT_STATS_ALL=(pd?.stats?.[0]?.splits||[]).filter(p=>(p.stat.gamesPlayed||0)>0);
    // Build 40-man roster — anyone not here has been released/traded
    ROSTER_STATUS={}; ROSTER_IDS=new Set();
    for(const p of (rd?.roster||[])){
      const id=p.person?.id; if(!id) continue;
      ROSTER_IDS.add(id);
      const code=p.status?.code||''; const desc=p.status?.description||'';
      if(code&&code!=='A') ROSTER_STATUS[id]={code,description:desc};
    }
    PLAYER_LOADED=true;
    if(currentTab==='players'){const el=document.getElementById('players-c');if(el)el.innerHTML=renderPlayers();}
    loadHitStreaks();
  }catch(e){console.error('Player stats error',e);}
  finally{PLAYER_LOADING=false;}
}

async function loadHitStreaks(){
  if(!BAT_STATS||!BAT_STATS.length)return;
  const qualified=BAT_STATS.filter(p=>(p.stat.atBats||0)>=15);
  const results=await Promise.allSettled(qualified.map(p=>
    fetch(`${MLB_API}/people/${p.player.id}/stats?stats=gameLog&group=hitting&season=${SEASON}&gameType=R`)
      .then(r=>r.ok?r.json():null)
      .then(d=>{
        const games=(d?.stats?.[0]?.splits||[]).sort((a,b)=>b.date>a.date?1:-1);
        let hit=0,cold=0,i=0;
        while(i<games.length&&(games[i].stat?.hits||0)>0){hit++;i++;}
        if(hit===0){i=0;while(i<games.length&&(games[i].stat?.hits||0)===0){cold++;i++;}}
        return{id:p.player.id,hit,cold};
      }).catch(()=>null)
  ));
  let changed=false;
  for(const r of results){if(r.status==='fulfilled'&&r.value){PLAYER_STREAKS[r.value.id]=r.value;changed=true;}}
  if(changed&&currentTab==='players'){const el=document.getElementById('players-c');if(el)el.innerHTML=renderPlayers();}
}

function renderPlayers(){
  const subTabsHtml=`<div class="pl-sub-tabs">
    <button class="pl-sub-btn ${plSubTab==='offense'?'active':''}" onclick="setPlSubTab('offense')">⚾ Hitting</button>
    <button class="pl-sub-btn ${plSubTab==='starters'?'active':''}" onclick="setPlSubTab('starters')">🏁 Starters</button>
    <button class="pl-sub-btn ${plSubTab==='bullpen'?'active':''}" onclick="setPlSubTab('bullpen')">🔥 Bullpen</button>
  </div>`;
  if(!PLAYER_LOADED){if(!PLAYER_LOADING)loadPlayerStats();return subTabsHtml+'<div class="loading"><div class="spin"></div>Loading player stats…</div>';}
  let body='';
  if(plSubTab==='offense')body=renderOffense();
  else if(plSubTab==='starters')body=renderStartersPl();
  else body=renderBullpenPl();
  return subTabsHtml+body;
}

function plLdrCard(cat,p,val,sub){
  if(!p)return'<div class="pl-ldr-card"><div class="pl-ldr-cat">'+cat+'</div><div class="pl-ldr-val" style="color:var(--t4)">—</div></div>';

function renderOffense(){
  if(!BAT_STATS||!BAT_STATS.length)return'<div style="color:var(--t4);text-align:center;padding:32px;font-size:.72rem">No batting data yet.</div>';
  const s=plSortOff;
  const sortFn=(a,b)=>{
    const av=parseFloat(a.stat[s.col])||0, bv=parseFloat(b.stat[s.col])||0;
    return s.dir===-1?bv-av:av-bv;
  };
  // Split: on 40-man = active/IL; not on 40-man = released/traded
  const on40=ROSTER_IDS.size>0?BAT_STATS.filter(p=>ROSTER_IDS.has(p.player.id)):BAT_STATS;
  const offRoster=ROSTER_IDS.size>0?BAT_STATS.filter(p=>!ROSTER_IDS.has(p.player.id)):[];
  // Main table: active + truly IL players only
  const mainBat=on40.filter(p=>!ROSTER_STATUS[p.player.id]||isILStatus(ROSTER_STATUS[p.player.id]));
  // Inactive: reassigned to minors / non-IL status on 40-man + released/traded
  const inactiveBat=[...on40.filter(p=>ROSTER_STATUS[p.player.id]&&!isILStatus(ROSTER_STATUS[p.player.id])),...offRoster];
  const players=[...mainBat].sort(sortFn);
  const byHR=[...mainBat].sort((a,b)=>(b.stat.homeRuns||0)-(a.stat.homeRuns||0));
  const byRBI=[...mainBat].sort((a,b)=>(b.stat.rbi||0)-(a.stat.rbi||0));
  const qual=mainBat.filter(p=>(p.stat.atBats||0)>=30);
  const byAVG=[...qual].sort((a,b)=>parseFloat(b.stat.avg||0)-parseFloat(a.stat.avg||0));
  const byOPS=[...qual].sort((a,b)=>parseFloat(b.stat.ops||0)-parseFloat(a.stat.ops||0));
  const col=s.col,dir=s.dir;
  const th=(lbl,key,title='')=>{const sorted=key===col;const arr=sorted?(dir===-1?'↓':'↑'):'';return`<th onclick="sortPl('offense','${key}')" class="${sorted?'pl-sorted':''}" title="${title}">${lbl}${arr?' '+arr:''}</th>`;};
  const streaksLoaded=Object.keys(PLAYER_STREAKS).length>0;
  const ilHitters=players.filter(p=>isILStatus(ROSTER_STATUS[p.player.id]));
  const rows=players.map(p=>{
    const st=p.stat,pid=p.player.id;
    const sk=PLAYER_STREAKS[pid];
    const rs=ROSTER_STATUS[pid];
    const il=isILStatus(rs);
    const streakBadge=sk&&!il?(sk.hit>=2?`<span class="pl-streak hot">🔥${sk.hit}</span>`:sk.cold>=5?`<span class="pl-streak cold">🥶${sk.cold}</span>`:''):'';
    const ilBadge=il?`<span class="pl-il-badge">IL</span>`:'';
    return`<tr class="${il?'pl-il-row':''}">
      <td>${p.player.fullName}${streakBadge}${ilBadge}</td>
      <td>${st.gamesPlayed||0}</td>
      <td>${st.avg||'.---'}</td>
      <td>${st.homeRuns||0}</td>
      <td>${st.rbi||0}</td>
      <td>${st.runs||0}</td>
      <td>${st.hits||0}</td>
      <td>${st.doubles||0}</td>
      <td>${st.baseOnBalls||0}</td>
      <td>${st.strikeOuts||0}</td>
      <td>${st.ops||'.---'}</td>
    </tr>`;
  }).join('');
  const ilSection=ilHitters.length?`<div class="pl-section-lbl pl-il-section-lbl">🏥 Injured List (${ilHitters.length})</div>
    <div class="pl-tbl-wrap"><table class="pl-tbl">
      <thead><tr><th style="text-align:left">Player</th><th>Status</th><th>AVG</th><th>HR</th><th>RBI</th><th>OPS</th></tr></thead>
