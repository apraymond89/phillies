<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:      #080808;
    --s1:      #101012;   /* card surface */
    --s2:      #161618;   /* elevated surface */
    --s3:      #1c1c1f;   /* border / divider */
    --red:        #E81828;
    --red-dim:    rgba(232,24,40,.12);
    --navy:       #003087;   /* Phillies navy */
    --navy-dim:   rgba(0,48,135,.22);
    --powder:     #7EB4D8;   /* retro powder blue — '70s road uniforms */
    --powder-dim: rgba(126,180,216,.1);
    --cream:      #F0E8D0;   /* vintage cream */
    --win:     #22c55e;
    --win-dim: rgba(34,197,94,.1);
    --loss:    #ef4444;
    --loss-dim:rgba(239,68,68,.1);
    --gold:    #f59e0b;
    --gold-dim:rgba(245,158,11,.1);
    --t1: #f0f0f2;   /* primary text */
    --t2: #aaa;      /* secondary */
    --t3: #666;      /* tertiary */
    --t4: #3a3a3e;   /* ghost */
    --shadow-sm: 0 1px 3px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.03);
    --shadow-md: 0 4px 16px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.03);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.04);
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
  }
  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--t1);
    min-height: 100vh;
    padding-bottom: 52px;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  /* ── HEADER ── */
  header {
    position: relative;
    background: linear-gradient(135deg, #070010 0%, #060d20 60%, #040812 100%);
    padding: 12px 20px 10px;
    text-align: center;
    overflow: hidden;
    border-bottom: 1px solid rgba(0,48,135,.4);
  }
  /* pinstripe */
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to right,
      transparent 0, transparent 19px,
      rgba(126,180,216,.04) 19px, rgba(126,180,216,.04) 20px
    );
    pointer-events: none;
  }
  /* red → navy gradient top bar */
  header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red) 0%, var(--navy) 100%);
  }
  .hdr-name {
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 7px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--red) 0%, var(--powder) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-family: 'Arial Black', Arial, sans-serif;
  }
  .hdr-sub {
    font-size: 0.5rem;
    color: rgba(126,180,216,.5);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .hdr-refresh {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--s3);
    border-radius: 20px;
    color: var(--t3);
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .2s, color .2s;
  }
  .refresh-btn:hover { border-color: var(--red); color: var(--red); }
  .last-upd { font-size: .62rem; color: var(--t2); background: var(--s2); border-radius: 20px; padding: 3px 10px; font-weight: 600; letter-spacing: .2px; transition: color .3s, background .3s; }
  .last-upd.live { color: var(--red); background: var(--red-dim); }

  /* batter/pitcher in inning tracker */
  .ab-players { display: flex; flex-direction: column; gap: 4px; margin-left: auto; flex-shrink: 0; max-width: 110px; text-align: right; }
  .ab-player-item { display: flex; flex-direction: column; }
  .ab-player-lbl { font-size: .42rem; color: var(--t4); font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
  .ab-player-name { font-size: .6rem; color: var(--t1); font-weight: 600; line-height: 1.2; }

  /* series record pill on schedule cards */
  .sc-series-rec { font-size: .54rem; font-weight: 600; letter-spacing: .2px; margin-top: 4px; }
  .sc-series-rec.phi { color: var(--win); }
  .sc-series-rec.opp { color: var(--loss); }
  .sc-series-rec.tie { color: var(--t4); }

  /* jump-to-today button on schedule cards */
  .sc-jump-btn { display: inline-flex; align-items: center; gap: 4px; font-size: .54rem; color: var(--red); border: 1px solid rgba(232,24,40,.3); border-radius: 20px; padding: 4px 10px; background: var(--red-dim); cursor: pointer; margin-top: 6px; font-family: inherit; font-weight: 600; }

  /* swipe hint */
  .swipe-hint { text-align: center; font-size: .52rem; color: var(--t4); padding: 4px 0 8px; letter-spacing: .3px; }

  /* player modal */
  .pl-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(6px); animation: fadeIn .15s ease; }
  .pl-modal { background: var(--s1); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 82vh; display: flex; flex-direction: column; }
  .pl-modal-hdr { display: flex; justify-content: space-between; align-items: center; padding: 18px 16px 10px; border-bottom: 1px solid var(--s3); flex-shrink: 0; }
  .pl-modal-title { font-size: .9rem; font-weight: 700; color: var(--t1); }
  .pl-modal-sub { font-size: .6rem; color: var(--t4); margin-top: 2px; }
  .pl-modal-close { background: var(--s3); border: none; color: var(--t1); width: 30px; height: 30px; border-radius: 50%; font-size: .9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .pl-modal-body { overflow-y: auto; padding: 12px 16px 24px; }
  .pl-gl-tbl { width: 100%; border-collapse: collapse; font-size: .58rem; }
  .pl-gl-tbl th { color: var(--t4); font-weight: 700; padding: 5px 4px; text-align: center; border-bottom: 1px solid var(--s3); font-size: .48rem; letter-spacing: .5px; position: sticky; top: 0; background: var(--s1); }
  .pl-gl-tbl th:first-child { text-align: left; }
  .pl-gl-tbl td { padding: 6px 4px; text-align: center; border-bottom: 1px solid var(--s2); color: var(--t2); }
  .pl-gl-tbl td:first-child { text-align: left; color: var(--t3); font-size: .52rem; }
  .pl-gl-tbl tr.gl-win td:first-child { color: var(--win); }
  .pl-gl-tbl tr.gl-loss td:first-child { color: var(--loss); }

  /* live pulse */
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    vertical-align: middle;
    margin-right: 4px;
    animation: ldpulse 1.4s ease-in-out infinite;
  }
  @keyframes ldpulse { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── TABS ── */
  .tabs {
    display: flex;
    margin: 14px 16px 0;
    background: linear-gradient(135deg, rgba(0,48,135,.12) 0%, rgba(232,24,40,.08) 100%);
    border-radius: var(--r-md);
    padding: 4px;
    gap: 3px;
    border: 1px solid rgba(0,48,135,.25);
    box-shadow: var(--shadow-sm);
  }
  .tab {
    flex: 1;
    padding: 9px 6px;
    text-align: center;
    cursor: pointer;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    border-radius: var(--r-sm);
    border: none;
    background: transparent;
    color: var(--t3);
    transition: background .18s, color .18s;
    font-family: inherit;
  }
  .tab.active { background: linear-gradient(135deg, var(--red) 0%, #b01020 100%); color: #fff; box-shadow: 0 1px 4px rgba(232,24,40,.4); }
  .tab:not(.active):hover { color: var(--powder); background: var(--navy-dim); }

  /* ── CONTENT ── */
  .content { padding: 16px; display: none; }
  .content.active { display: block; }

  /* ── UTILITY ── */
  .section-label {
    font-size: 0.54rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--powder);
    margin: 20px 0 8px;
    padding: 4px 8px;
    border-left: 2px solid var(--navy);
    border-bottom: 1px solid rgba(0,48,135,.2);
    background: linear-gradient(90deg, var(--navy-dim) 0%, transparent 70%);
    border-radius: 0 2px 2px 0;
  }
  .card {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-pad { padding: 16px; }

  /* ── NEXT GAME ── */
  .ng-hero {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-md);
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .ng-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--red) 0%, var(--navy) 100%);
  }
  .ng-label {
    font-size: 0.56rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--red);
    text-align: center;
    margin-bottom: 14px;
  }
  .ng-venue {
    text-align: center;
    font-size: 0.6rem;
    color: var(--t3);
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .ng-matchup {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .ng-team { text-align: center; }
  .ng-emoji { font-size: 2.8rem; display: block; margin-bottom: 4px; line-height: 1; }
  .ng-tname { font-size: 0.82rem; font-weight: 700; color: var(--t1); }
  .ng-tname.phils { color: var(--red); }
  .ng-vs {
    font-size: 0.6rem;
    color: var(--t4);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 12px;
    border: 1px solid var(--s3);
    border-radius: 20px;
    background: var(--s2);
  }
  .ng-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .ng-meta-item {
    background: var(--s2);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    border: 1px solid var(--s3);
  }
  .ng-meta-lbl { font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; color: var(--powder); margin-bottom: 4px; }
  .ng-meta-val { font-size: 0.78rem; font-weight: 700; color: var(--t1); }

  /* Score display */
  .score-block {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    background: var(--s2);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 16px;
    margin-bottom: 14px;
  }
  .score-side { text-align: center; flex: 1; }
  .score-num {
    font-size: 3rem;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    line-height: 1;
  }
  .score-num.ahead { color: var(--win); }
  .score-num.behind { color: var(--loss); }
  .score-num.tied-c { color: var(--gold); }
  .score-lbl { font-size: 0.52rem; letter-spacing: 2px; text-transform: uppercase; color: var(--t3); margin-top: 4px; }
  .score-divider {
    width: 1px;
    height: 48px;
    background: var(--s3);
    margin: 0 16px;
    flex-shrink: 0;
  }
  .score-status-row {
    text-align: center;
    font-size: 0.56rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-top: 10px;
  }

  /* Countdown */
  .countdown {
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 14px;
    text-align: center;
    background: var(--s2);
  }
  .cd-lbl { font-size: 0.54rem; letter-spacing: 2px; text-transform: uppercase; color: var(--t3); margin-bottom: 6px; }
  .cd-time {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: 2px;
    font-family: 'Arial Black', Arial, sans-serif;
    color: var(--t1);
  }

  /* Info rows (TV / Radio) */
  .info-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s;
  }
  a.info-row:hover { border-color: var(--red); }
  .ir-icon { font-size: 1.3rem; width: 32px; text-align: center; flex-shrink: 0; }
  .ir-title { font-size: 0.82rem; font-weight: 700; }
  .ir-sub { font-size: 0.64rem; color: var(--t2); margin-top: 2px; }
  .ir-url { font-size: 0.58rem; color: var(--red); margin-top: 2px; }
  .ir-badge {
    margin-left: auto;
    font-size: 0.54rem;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .ir-badge.free { background: var(--win-dim); color: var(--win); }
  .ir-badge.sub { background: var(--s2); color: var(--t3); border: 1px solid var(--s3); }
  .ir-arrow { font-size: 0.75rem; color: var(--t4); margin-left: 6px; flex-shrink: 0; }

  /* ── SCHEDULE ── */
  .week-hdr {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cream);
    margin: 0 0 12px;
    padding: 8px 12px;
    background: linear-gradient(90deg, var(--navy-dim) 0%, transparent 80%);
    border-left: 3px solid var(--navy);
    border-bottom: 1px solid rgba(0,48,135,.2);
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
  }
  .week-hdr span { color: var(--powder); margin-right: 6px; }

  .sc-card {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-left: 3px solid var(--t4);
    border-radius: var(--r-lg);
    overflow: hidden;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s;
  }
  .sc-card.live  { border-color: var(--red); border-left-color: var(--red); }
  .sc-card.today { border-left-color: var(--navy); }
  .sc-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    background: linear-gradient(90deg, rgba(0,48,135,.1) 0%, var(--s2) 50%);
    border-bottom: 1px solid rgba(0,48,135,.15);
  }
  .sc-hdr-date { font-size: 0.64rem; color: var(--powder); font-weight: 600; letter-spacing: .5px; }
  .sc-pill {
    font-size: 0.56rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .sc-pill.sched { background: var(--s1); color: var(--t3); border: 1px solid var(--s3); }
  .sc-pill.live-p { background: var(--red); color: #fff; }
  .sc-pill.win-p { background: var(--win-dim); color: var(--win); }
  .sc-pill.loss-p { background: var(--loss-dim); color: var(--loss); }
  .sc-body { padding: 14px; }
  .sc-matchup {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .sc-team-emoji { font-size: 1.4rem; flex-shrink: 0; }
  .sc-opp-name { font-size: 1rem; font-weight: 700; flex: 1; }
  .sc-ha { font-size: 0.58rem; color: var(--t3); }
  .sc-final { font-size: 1rem; font-weight: 900; font-family: 'Arial Black', Arial, sans-serif; }
  .sc-final.w { color: var(--win); }
  .sc-final.l { color: var(--loss); }
  .sc-final.lv { color: var(--red); }
  .sc-info-row { font-size: 0.66rem; color: var(--t2); line-height: 1.9; }
  .sc-info-row strong { color: var(--t1); font-weight: 600; }
  .sc-venue { font-size: 0.58rem; color: var(--t4); margin-top: 6px; letter-spacing: .3px; }
  .no-games { text-align: center; padding: 48px 20px; color: var(--t4); font-size: 0.72rem; letter-spacing: 1px; }

  /* ── SERIES TRACKER ── */

  /* Top summary */
  .sr-top {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }
  .sr-top::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--red) 0%, var(--navy) 100%);
  }
  .sr-top-title {
    font-size: 0.54rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--powder);
    text-align: center;
    margin-bottom: 14px;
  }
  .sr-counts {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .sr-cbox {
    text-align: center;
    background: var(--s2);
    border: 1px solid var(--s3);
    border-radius: var(--r-sm);
    padding: 12px 6px;
  }
  .sr-cnum {
    font-size: 2.2rem;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    line-height: 1;
  }
  .sr-cnum.g { color: var(--win); }
  .sr-cnum.r { color: var(--loss); }
  .sr-cnum.y { color: var(--gold); }
  .sr-clbl { font-size: 0.5rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t3); margin-top: 4px; }
  .sr-pct { font-size: 1rem; font-weight: 700; color: var(--gold); text-align: center; letter-spacing: 1px; }
  .sr-pct-lbl { font-size: 0.5rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t3); text-align: center; margin-top: 2px; margin-bottom: 12px; }
  .sr-pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
  .pill {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.5rem; font-weight: 700;
  }
  .pill.w { background: var(--win-dim); color: var(--win); }
  .pill.l { background: var(--loss-dim); color: var(--loss); }
  .pill.s { background: var(--gold-dim); color: var(--gold); }

  /* Season grid */
  .sg-wrap {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .sg-title {
    font-size: 0.54rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--powder);
    margin-bottom: 12px;
  }
  .sg-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .sg-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    aspect-ratio: 1;
    border-radius: var(--r-sm);
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: transform .12s, opacity .12s;
    padding: 4px 2px;
  }
  .sg-tile:hover { transform: scale(1.06); opacity: .9; }
  .sg-tile:active { transform: scale(.97); }
  .sg-emoji { font-size: 1.1rem; line-height: 1; }
  .sg-abbr { font-size: 0.5rem; font-weight: 700; letter-spacing: .3px; line-height: 1; }
  .sg-res { font-size: 0.44rem; font-weight: 700; letter-spacing: .3px; line-height: 1; opacity: .85; }
  .sg-tile.won   { background: var(--win-dim);  color: var(--win);  border: 1px solid rgba(34,197,94,.15); }
  .sg-tile.sweep { background: rgba(34,197,94,.18); color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
  .sg-tile.lost  { background: var(--loss-dim); color: var(--loss); border: 1px solid rgba(239,68,68,.15); }
  .sg-tile.swept { background: rgba(239,68,68,.18); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
  .sg-tile.split { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(245,158,11,.15); }
  .sg-tile.live  { background: var(--red); color: #fff; border: 1px solid var(--red); }
  .sg-tile.upcoming { background: var(--s2); color: var(--t2); border: 1px solid var(--s3); }

  /* Pace */
  .pace-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .pace-box {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 14px 12px;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .pace-lbl { font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; color: var(--powder); margin-bottom: 8px; }
  .pace-num {
    font-size: 1.5rem;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    line-height: 1;
    letter-spacing: 1px;
  }
  .pace-num .pw { color: var(--win); }
  .pace-num .pd { color: var(--t4); }
  .pace-num .pl { color: var(--loss); }
  .pace-sub { font-size: 0.5rem; color: var(--t4); margin-top: 5px; line-height: 1.4; }

  /* Standings */
  .std-wrap {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: var(--r-lg);
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .std-header {
    padding: 10px 14px;
    background: linear-gradient(90deg, var(--navy) 0%, #001a50 100%);
    border-bottom: 1px solid rgba(0,48,135,.4);
    font-size: 0.54rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--powder);
    display: flex;
    justify-content: space-between;
  }
  .std-header-cols { display: flex; gap: 2px; }
  .std-header-col { width: 34px; text-align: right; font-size: 0.5rem; letter-spacing: 1px; }
  .std-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--s3);
    font-size: 0.74rem;
    transition: background .12s;
  }
  .std-row:last-child { border-bottom: none; }
  .std-row:hover { background: var(--s2); }
  .std-row.phils { background: linear-gradient(90deg, rgba(0,48,135,.1) 0%, rgba(232,24,40,.05) 100%); }
  .std-pos { width: 14px; font-size: 0.58rem; color: var(--t3); flex-shrink: 0; }
  .std-emoji { font-size: 0.9rem; width: 22px; text-align: center; flex-shrink: 0; }
  .std-name { flex: 1; font-weight: 600; font-size: 0.76rem; }
  .std-row.phils .std-name { color: var(--red); font-weight: 700; }
  .std-wl { width: 38px; text-align: right; color: var(--t2); font-weight: 700; font-size: 0.7rem; }
  .std-pct { width: 34px; text-align: right; color: var(--t3); font-size: 0.64rem; }
  .std-gb { width: 28px; text-align: right; color: var(--t4); font-size: 0.62rem; }

  /* Series rows — horizontal layout */
  .series-all-title {
    font-size: 0.54rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--powder);
    margin: 4px 0 8px;
    padding: 5px 8px;
    border-left: 2px solid var(--navy);
    background: linear-gradient(90deg, var(--navy-dim) 0%, transparent 70%);
    border-radius: 0 2px 2px 0;
  }

  .sr-row {
    display: flex;
    align-items: stretch;
    background: var(--s1);
    border: 1px solid var(--s3);
    border-left: 3px solid var(--s3);
    border-radius: var(--r-md);
    overflow: hidden;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    scroll-margin-top: 16px;
  }
  .sr-row.won    { border-left-color: var(--win); }
  .sr-row.sweep  { border-left-color: #4ade80; border-color: rgba(34,197,94,.35); box-shadow: 0 0 0 1px rgba(34,197,94,.12), var(--shadow-sm); }
  .sr-row.lost   { border-left-color: var(--loss); }
  .sr-row.swept  { border-left-color: #f87171; border-color: rgba(239,68,68,.3); box-shadow: 0 0 0 1px rgba(239,68,68,.1), var(--shadow-sm); }
  .sr-row.split  { border-left-color: var(--gold); }
  .sr-row.live-r { border-left-color: var(--red); }

  /* Left info panel */
  .sr-left {
    width: 108px;
    flex-shrink: 0;
    background: var(--s2);
    padding: 10px 9px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 5px;
    border-right: 1px solid var(--s3);
  }
  .sr-row.sweep  .sr-left { background: rgba(34,197,94,.07); }
  .sr-row.swept  .sr-left { background: rgba(239,68,68,.07); }
  .sr-row.live-r .sr-left { background: rgba(232,24,40,.06); }

  .sr-badge {
    font-size: 0.46rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: .5px;
    text-transform: uppercase;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .sr-badge.won    { background: var(--win-dim); color: var(--win); }
  .sr-badge.sweep  { background: rgba(34,197,94,.22); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
  .sr-badge.lost   { background: var(--loss-dim); color: var(--loss); }
  .sr-badge.swept  { background: rgba(239,68,68,.18); color: #f87171; border: 1px solid rgba(239,68,68,.25); }
  .sr-badge.split  { background: var(--gold-dim); color: var(--gold); }
  .sr-badge.live-r { background: var(--red); color: #fff; }
  .sr-badge.upcoming { background: var(--s1); color: var(--t3); border: 1px solid var(--s3); }

  .sr-opp-info  { display: flex; align-items: center; gap: 4px; }
  .sr-team-emoji { font-size: 1rem; line-height: 1; }
  .sr-opp-name  { font-size: 0.72rem; font-weight: 700; color: var(--t1); line-height: 1.2; }
  .sr-ha        { font-size: 0.48rem; color: var(--t3); letter-spacing: .3px; }
  .sr-dates     { font-size: 0.46rem; color: var(--t4); letter-spacing: .2px; }
  .sr-gc        { font-size: 0.46rem; color: var(--t3); letter-spacing: .5px; }

  /* Right game cells */
  .sr-right {
    flex: 1;
    display: flex;
    align-items: stretch;
    overflow-x: auto;
  }
  .sr-game {
    flex: 1;
    min-width: 60px;
    padding: 8px 5px;
    text-align: center;
    border-right: 1px solid var(--s3);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .sr-game:last-child { border-right: none; }
  .sr-g-lbl { font-size: 0.44rem; letter-spacing: 1px; text-transform: uppercase; color: var(--t4); margin-bottom: 5px; }
  .sr-g-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 5px;
    border-radius: 4px;
    margin-bottom: 1px;
    width: 100%;
  }
  .sr-g-line.row-win { background: var(--win-dim); }
  .sr-g-abbr { font-size: 0.5rem; font-weight: 700; }
  .sr-g-abbr.p { color: var(--red); }
  .sr-g-abbr.o { color: var(--t3); }
  .sr-g-score { font-size: 0.84rem; font-weight: 900; font-family: 'Arial Black', Arial, sans-serif; }
  .sr-g-score.win  { color: var(--win); }
  .sr-g-score.lose { color: var(--loss); }
  .sr-g-score.live-s { color: var(--red); }
  .sr-g-score.u { color: var(--t4); font-size: 0.58rem; font-weight: 400; font-family: inherit; }
  .sr-g-result { font-size: 0.42rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-top: 3px; }
  .sr-g-result.w { color: var(--win); }
  .sr-g-result.l { color: var(--loss); }
  .sr-g-result.lv { color: var(--red); }
  .sr-g-tv { font-size: 0.4rem; color: var(--t4); margin-top: 2px; }

  /* ── STREAK VISUAL ── */
  .streak-card {
    background: var(--s1);
    border: 1px solid rgba(0,48,135,.25);
    border-top: 2px solid var(--navy);
    border-radius: var(--r-lg);
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }
  .streak-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 11px;
  }
  .streak-lbl {
    font-size: 0.54rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--powder);
  }
  .streak-badge {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: .5px;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .streak-badge.sw { background: var(--win-dim); color: var(--win); }
  .streak-badge.sl { background: var(--loss-dim); color: var(--loss); }
  .streak-pills-row {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-bottom: 10px;
  }
  .streak-pills-row .pill { width: 26px; height: 26px; font-size: 0.52rem; }
  .streak-footer {
    text-align: center;
    font-size: 0.6rem;
    color: var(--t4);
    letter-spacing: .5px;
  }
  .streak-footer strong { color: var(--t2); }

  /* ── GAME NAV ── */
  .ng-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
  }
  .ng-nav-btn {
    background: var(--s1);
    border: 1px solid var(--s3);
    border-radius: 20px;
    color: var(--t2);
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: .5px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .15s, color .15s;
  }
  .ng-nav-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
  .ng-nav-btn:disabled { opacity: .3; cursor: default; }
  .ng-nav-label { font-size: 0.54rem; color: var(--t3); letter-spacing: 1px; text-transform: uppercase; text-align: center; }

  /* ── PROBABLE PITCHERS ── */
  .pitchers-card {
    background: var(--s2);
    border: 1px solid var(--s3);
    border-radius: var(--r-md);
    padding: 10px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

// ─── PARSE ─────────────────────────────────────────────────────────────────
function parseGames(data) {
  const games = [];
  for (const dateObj of (data.dates||[])) {
    for (const g of (dateObj.games||[])) {
      const ht=g.teams.home.team.name, at=g.teams.away.team.name;
      const isHome=ht.includes('Philadelphia')||ht.includes('Phillies');
      if (!isHome&&!at.includes('Philadelphia')&&!at.includes('Phillies')) continue;
      const state=g.status?.abstractGameState||'', detail=g.status?.detailedState||'';
      const played=state==='Final'||detail.includes('Final')||detail==='Game Over';
      const inProgress=state==='Live'||detail==='In Progress';
      const postponed=detail.includes('Postponed')||detail.includes('Suspended');
      const hs=(played||inProgress)?(g.teams.home.score??null):null;
      const as_=(played||inProgress)?(g.teams.away.score??null):null;
      const broadcasts=(g.broadcasts||[]).filter(b=>b.type==='TV'&&(b.language==='en'||!b.language)).map(b=>b.name).filter((v,i,a)=>a.indexOf(v)===i);
      const opponent=isHome?at.replace('Philadelphia ',''):ht.replace('Philadelphia ','');
      const philliesScore=isHome?hs:as_, oppScore=isHome?as_:hs;
      let gameTimeUTC='18:00:00';
      if (g.gameDate) gameTimeUTC=g.gameDate.split('T')[1]?.replace('Z','')||'18:00:00';
      let inningStr='';
      if (inProgress&&g.linescore){const inn=g.linescore.currentInning||'',half=g.linescore.inningHalf||'';if(inn)inningStr=`${half==='Top'?'Top':'Bot'} ${inn}${inn===1?'st':inn===2?'nd':inn===3?'rd':'th'}`;}
      const philliesProbable=isHome?(g.teams.home.probablePitcher?.fullName||null):(g.teams.away.probablePitcher?.fullName||null);
      const oppProbable=isHome?(g.teams.away.probablePitcher?.fullName||null):(g.teams.home.probablePitcher?.fullName||null);
      const ls=g.linescore?{innings:g.linescore.innings||[],awayHits:g.linescore.teams?.away?.hits,homeHits:g.linescore.teams?.home?.hits,awayErrors:g.linescore.teams?.away?.errors,homeErrors:g.linescore.teams?.home?.errors}:null;
      games.push({gamePk:g.gamePk,h:ht,a:at,d:dateObj.date,t:gameTimeUTC,broadcasts,tv:broadcasts[0]||'TBD',hs,as:as_,isHome,opponent,phillies:philliesScore,opp:oppScore,played,inProgress,postponed,status:detail,inningStr,venue:g.venue?.name||(isHome?'Citizens Bank Park':opponent),philliesProbable,oppProbable,ls});
    }
  }
  return games.sort((a,b)=>(a.d+a.t)>(b.d+b.t)?1:-1);
}
function parseStandings(data) {
  const out=[];
  for (const rec of (data.records||[])) {
    for (const tr of (rec.teamRecords||[])) out.push({
      teamId:tr.team.id,
      name:tr.team.name.replace('Philadelphia ',''),
      wins:tr.wins, losses:tr.losses, pct:tr.winningPercentage,
      gb:tr.gamesBack, divGb:tr.divisionGamesBack||tr.gamesBack,
      wcGb:tr.wildCardGamesBack||'—',
      divisionId:rec.division?.id, divisionName:rec.division?.name||'',
      leagueId:rec.league?.id, leagueName:rec.league?.name||'',
      divRank:parseInt(tr.divisionRank)||99,
      wcRank:parseInt(tr.wildCardRank)||99,
      isDivLeader:tr.divisionRank==='1',
      isPhillies:tr.team.id===PHILLIES_ID,
    });
  }
  return out;
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
function pt(d,t) {
  try {
    const dt=new Date(`${d}T${t||'18:00:00'}Z`), tz={timeZone:'America/New_York'};
    return {date:dt.toLocaleDateString('en-US',{...tz,weekday:'short',month:'short',day:'numeric'}),time:dt.toLocaleTimeString('en-US',{...tz,hour:'numeric',minute:'2-digit',timeZoneName:'short'}),timeShort:dt.toLocaleTimeString('en-US',{...tz,hour:'numeric',minute:'2-digit'}),short:dt.toLocaleDateString('en-US',{...tz,month:'short',day:'numeric'}),ms:dt.getTime()};
  } catch { return {date:d,time:'TBD',timeShort:'TBD',short:d,ms:0}; }
}
function todayStr(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});}
function nextGame() {
  // Priority: live game → today's game (even if finished) → next upcoming → last played
  const live=ALL.find(g=>g.inProgress); if(live) return live;
  const td=todayStr();
  const todayGame=ALL.find(g=>g.d===td); if(todayGame) return todayGame;
  const now=Date.now();
  return ALL.find(g=>!g.played&&!g.postponed&&new Date(`${g.d}T${g.t}Z`).getTime()>now-10800000)||ALL.filter(g=>g.played).slice(-1)[0]||ALL[0];
}
function seriesGroups() {
  const gs=[]; let cur=null;
  for (const g of ALL){if(!cur||cur.opp!==g.opponent){cur={opp:g.opponent,games:[]};gs.push(cur);}cur.games.push(g);}
  return gs;
}
function seriesResult(games) {
  const done=games.filter(g=>g.played);
  if (games.some(g=>g.inProgress)) return 'live';
  if (!done.length) return 'upcoming';
  const w=done.filter(g=>g.phillies>g.opp).length,l=done.filter(g=>g.phillies<g.opp).length;
  if (done.length===games.length){if(w===done.length)return 'sweep';if(l===done.length)return 'swept';}
  if (w>l) return 'won'; if (l>w) return 'lost'; return 'split';
}

function renderLinescore(g) {

  const ti=teamInfo(g.opponent), inns=g.ls.innings, cols=Math.max(9,inns.length);

    return `<td>${val!==undefined?val:''}</td>`;

  const awayR=g.isHome?g.opp??'':g.phillies??'';
  const homeR=g.isHome?g.phillies??'':g.opp??'';
  const awayH=g.ls.awayHits??'', homeH=g.ls.homeHits??'';

    </tbody>
  </table></div>`;
}

function buildLiveStatsBodyHtml() {

function toggleLiveStats() {
  liveStatsOpen=!liveStatsOpen;
  const live=ALL.find(g=>g.inProgress);
  if(liveStatsOpen&&live&&(!liveBoxLoaded||liveStatsGamePk!==live.gamePk)) {
    // Show toggle open immediately while data loads
    const btn=document.getElementById('live-stats-btn');
    const body=document.getElementById('live-stats-body');
    if(btn){btn.classList.add('open');btn.innerHTML='<span>📊 Game Stats</span><span>▲</span>';}
    if(body){body.style.display='block';body.innerHTML='<div class="loading" style="padding:20px 0"><div class="spin"></div>Loading game data…</div>';}
    loadLiveBox(live.gamePk);

function setLiveSubTab(t) {
  liveStatsSubTab=t;

async function loadLiveBox(gamePk) {
  liveStatsGamePk=gamePk;
  try {
    const [boxR,feedR]=await Promise.all([
      fetch(`${MLB_API}/game/${gamePk}/boxscore`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live?fields=liveData,plays,allPlays,scoringPlays,result,about,description,inning,halfInning`).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    LIVE_BOX=boxR; LIVE_PLAYS_DATA=feedR; liveBoxLoaded=true;
  } catch(e){console.error('live box error',e);}
  // Update body without full re-render
  if(liveStatsOpen){
    const body=document.getElementById('live-stats-body');
    if(body) body.innerHTML=buildLiveStatsBodyHtml();
    else renderTab('next');
  }
}

// ─── INNING TRACKER ───────────────────────────────────────────────────────────
function renderInningTracker(g) {
  if (!g.inProgress) return '';
  const isTop=g.inningStr?.startsWith('Top');
  const innNum=g.inningStr?.replace(/^(Top|Bot)\s/,'')||'—';
  const balls=g.balls??0, strikes=g.strikes??0, outs=g.outs??0;
  const on1=!!g.offense?.first, on2=!!g.offense?.second, on3=!!g.offense?.third;

  // Count pips: balls (max 4), strikes (max 3), outs (max 3)
  const ballPips=  Array.from({length:4},(_,i)=>`<div class="ab-pip${i<balls?' on':''}"></div>`).join('');
  const strikePips=Array.from({length:3},(_,i)=>`<div class="ab-pip${i<strikes?' on':''}"></div>`).join('');
  const outPips=   Array.from({length:3},(_,i)=>`<div class="ab-pip${i<outs?' out-on':''}"></div>`).join('');

  // Batter / pitcher names — strip last name only for brevity
  const lastName=n=>n?n.split(' ').slice(-1)[0]:'';
  const batterName=g.batter?lastName(g.batter):'';
  const pitcherName=g.pitcher?lastName(g.pitcher):'';
  const pitchCount=(()=>{if(!g.pitcherId||!LIVE_BOX)return null;const home=LIVE_BOX.teams?.home?.players?.[`ID${g.pitcherId}`];const away=LIVE_BOX.teams?.away?.players?.[`ID${g.pitcherId}`];const p=home||away;return p?.stats?.pitching?.pitchesThrown??null;})();
  const playersHtml=(batterName||pitcherName)?`<div class="ab-players">
    ${batterName?`<div class="ab-player-item"><div class="ab-player-lbl">AT BAT</div><div class="ab-player-name">${batterName}</div></div>`:''}
    ${pitcherName?`<div class="ab-player-item"><div class="ab-player-lbl">PITCHING</div><div class="ab-player-name">${pitcherName}${pitchCount!=null?`<span style="font-size:.42rem;color:var(--t3);font-weight:500;margin-left:3px">${pitchCount}P</span>`:''}</div></div>`:''}
  </div>`:'';

  return`<div class="ab-card">
    <div class="ab-inning">
      <div class="ab-half">${isTop?'▲ TOP':'▼ BOT'}</div>
      ${innNum}
    </div>
    <div class="ab-count">
      <div class="ab-count-item">
        <div class="ab-cnt-lbl">Balls</div>
        <div class="ab-cnt-val balls">${balls}</div>
        <div class="ab-pips">${ballPips}</div>
      </div>
      <div class="ab-count-item">
        <div class="ab-cnt-lbl">Strikes</div>
        <div class="ab-cnt-val strikes">${strikes}</div>
        <div class="ab-pips">${strikePips}</div>
      </div>
      <div class="ab-count-item">
        <div class="ab-cnt-lbl">Outs</div>
        <div class="ab-cnt-val outs">${outs}</div>
        <div class="ab-pips">${outPips}</div>
      </div>
    </div>
    <div class="ab-diamond">
      <div class="ab-base ab-b2${on2?' on':''}"></div>
      <div class="ab-base ab-b3${on3?' on':''}"></div>
      <div class="ab-base ab-b1${on1?' on':''}"></div>
      <div class="ab-base ab-bh"></div>
    </div>
    ${playersHtml}
  </div>`;
}

    ?g.broadcasts.map(b=>{const info=getBc(b);if(!info)return'';return`<a class="info-row" href="${info.url}" target="_blank" rel="noopener"><div class="ir-icon">${info.icon}</div><div><div class="ir-title">${info.display}</div><div class="ir-sub">${info.stream}</div><div class="ir-url">${info.url.replace('https://','')}</div></div><span class="ir-badge ${info.type}">${info.type==='free'?'Free':'Sub'}</span><span class="ir-arrow">↗</span></a>`;}).join('')
    :`<div class="info-row"><div class="ir-icon">📺</div><div><div class="ir-title">TBD</div><div class="ir-sub">Check ESPN app closer to game time</div></div></div>`;
  const radioRows=RADIO.map(r=>`<a class="info-row" href="${r.url}" target="_blank" rel="noopener"><div class="ir-icon">${r.i}</div><div><div class="ir-title">${r.n}</div><div class="ir-sub">${r.d}</div><div class="ir-url">${r.url.replace('https://','')}</div></div><span class="ir-arrow">↗</span></a>`).join('');
  const watchSection=`<div class="section-label">📺 Watch Online</div>${tvRows}<div class="section-label">📻 Listen Live</div>${radioRows}`;

  // ── PRE-GAME ──
  if (!g.played && !g.inProgress) {
    const cdBlock=isDefaultView&&ms>Date.now()+60000?`<div class="countdown" style="margin-top:14px"><div class="cd-lbl">⏱ Time Until First Pitch</div><div class="cd-time" id="cdtime">—</div></div>`:'';
    const heroBlock=`<div class="ng-hero">
      <div class="ng-label">${g.postponed?'⚠️ Postponed':g.d===todayStr()?'Today':'Next Game'}</div>
      <div class="ng-matchup">
        <div class="ng-team"><span class="ng-emoji">🔔</span><div class="ng-tname phils">Phillies</div></div>
        <div class="ng-vs">vs</div>
        <div class="ng-team"><span class="ng-emoji">${ti.e}</span><div class="ng-tname">${g.opponent}</div></div>
      </div>
      ${cdBlock}
    </div>`;
    return navBar+heroBlock+pitcherCard+metaGrid+watchSection;
  }

  // ── LIVE / FINAL ──
  const phW=g.phillies>g.opp, oppW=g.opp>g.phillies;
  const scoreBlock=`<div class="score-block">
    <div class="score-side">
      <div class="score-num ${phW?'ahead':oppW?'behind':'tied-c'}">${g.phillies}</div>
      <div class="score-lbl">PHI</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-side">
      <div class="score-num ${oppW?'ahead':phW?'behind':'tied-c'}">${g.opp}</div>
      <div class="score-lbl">${ti.a}</div>
    </div>
  </div>
  <div class="score-status-row">${g.inProgress?`<span class="live-dot"></span>${g.inningStr||'In Progress'}`:`Final · ${phW?'✅ Win':'❌ Loss'}`}</div>`;

  const heroBlock=`<div class="ng-hero">
    <div class="ng-label">${g.inProgress?'<span class="live-dot"></span>Live Now':'Final'}</div>
    <div class="ng-matchup">
      <div class="ng-team"><span class="ng-emoji">🔔</span><div class="ng-tname phils">Phillies</div></div>
      <div class="ng-vs">vs</div>
      <div class="ng-team"><span class="ng-emoji">${ti.e}</span><div class="ng-tname">${g.opponent}</div></div>
    </div>
    ${scoreBlock}
  </div>`;

  const linescore=renderLinescore(g);
  const inningTracker=g.inProgress?renderInningTracker(g):'';
  const livePanel=g.inProgress?renderLiveStatsCard(g):'';

  return navBar+heroBlock+linescore+inningTracker+livePanel+pitcherCard+metaGrid+watchSection;
}

function startCd(ms) {
  if (cdTimer) clearInterval(cdTimer);
  const tick=()=>{const el=document.getElementById('cdtime');if(!el){clearInterval(cdTimer);return;}const d=ms-Date.now();if(d<=0){el.textContent='Starting soon…';clearInterval(cdTimer);return;}const dy=Math.floor(d/86400000),h=Math.floor((d%86400000)/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);el.textContent=dy>0?`${dy}d ${h}h ${m}m`:`${h}h ${m}m ${s}s`;};
  tick(); cdTimer=setInterval(tick,1000);
}

// ─── SCHEDULE ──────────────────────────────────────────────────────────────
function renderSchedule() {
  const now=Date.now(),dayMs=86400000,cutoff=now+8*dayMs;
  const todayStr=new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});
  let weekGames=ALL.filter(g=>{const gms=new Date(`${g.d}T${g.t}Z`).getTime();return(gms<cutoff&&gms>now-dayMs)||g.inProgress||g.d===todayStr;});
  if (!weekGames.length){const ng=ALL.find(g=>!g.played&&!g.inProgress);weekGames=ng?ALL.slice(ALL.indexOf(ng),ALL.indexOf(ng)+6):[];if(!weekGames.length)return'<div class="no-games">No upcoming games found.</div>';}
  const hdr=weekGames.some(g=>g.d===todayStr)?'This Week':'Next Games';

  // Build series record lookup: for each game, find the running series record
  const allGrps=seriesGroups();
  function getSeriesRec(game){
    const grp=allGrps.find(gr=>gr.games.includes(game));
    if(!grp) return null;
    const w=grp.games.filter(g=>g.played&&g.phillies>g.opp).length;
    const l=grp.games.filter(g=>g.played&&g.phillies<g.opp).length;
    const total=grp.games.length;
    if(!w&&!l) return {txt:`${total}-game series`,cls:'tie'};
    if(w>l) return {txt:`PHI leads ${w}–${l}`,cls:'phi'};
    if(l>w) return {txt:`Opp leads ${l}–${w}`,cls:'opp'};
    return {txt:`Tied ${w}–${l}`,cls:'tie'};
  }

  const cards=weekGames.map(g=>{
    const {date,time}=pt(g.d,g.t),ti=teamInfo(g.opponent),today=g.d===todayStr;
    let pillHtml='',cardCls='',resultHtml='';
    if(g.inProgress){pillHtml=`<span class="sc-pill live-p"><span class="live-dot"></span>${g.inningStr||'Live'}</span>`;cardCls='live';if(g.phillies!=null)resultHtml=`<div class="sc-final lv">${g.phillies}–${g.opp}</div>`;}
    else if(g.played){const w=g.phillies>g.opp;pillHtml=`<span class="sc-pill ${w?'win-p':'loss-p'}">${w?'W':'L'} ${g.phillies}–${g.opp}</span>`;resultHtml=`<div class="sc-final ${w?'w':'l'}">${w?'W':'L'} ${g.phillies}–${g.opp}</div>`;}
    else if(g.postponed){pillHtml=`<span class="sc-pill sched">PPD</span>`;}
    else{pillHtml=`<span class="sc-pill sched">${time}</span>`;if(today)cardCls='today';}
    const tvText=g.broadcasts.length?g.broadcasts.map(b=>{const info=getBc(b);return info?`${info.icon} <strong>${info.display}</strong> — ${info.stream}`:b;}).join('<br>'):'📺 TBD';
    const radioText=RADIO.map(r=>`${r.i} ${r.n}`).join(' &nbsp;·&nbsp; ');
    const sr=getSeriesRec(g);
    const seriesRecHtml=sr?`<div class="sc-series-rec ${sr.cls}">${sr.txt}</div>`:'';
    const gameIdx=ALL.indexOf(g);
    const jumpBtn=(g.inProgress||(!g.played&&gameIdx>=0))?`<button class="sc-jump-btn" onclick="jumpToGame(${gameIdx})">▶ Today Tab</button>`:'';
    return`<div class="sc-card ${cardCls}">
      <div class="sc-hdr"><span class="sc-hdr-date">${date}</span>${pillHtml}</div>
      <div class="sc-body">
        <div class="sc-matchup">
          <span class="sc-team-emoji">${ti.e}</span>
          <div><div class="sc-opp-name">${g.isHome?'vs ':'@ '}${g.opponent}</div><div class="sc-ha">${g.isHome?'🏠 Home':'✈️ Away'}</div>${seriesRecHtml}</div>
          ${resultHtml}
        </div>
        ${(g.philliesProbable||g.oppProbable)?`<div class="sc-pitchers">⚾ <span>${g.philliesProbable||'TBD'}</span> vs <span>${g.oppProbable||'TBD'}</span></div>`:''}
        <div class="sc-info-row">${tvText}</div>
        <div class="sc-info-row" style="margin-top:2px">${radioText}</div>
        <div class="sc-venue">🏟 ${g.venue}</div>
        ${jumpBtn}
      </div>
    </div>`;
  }).join('');

  const allPlayed=ALL.filter(x=>x.played);
  const last10=allPlayed.slice(-10);
  let streakLen=0,streakType='';
  if(allPlayed.length){const lx=allPlayed[allPlayed.length-1];streakType=lx.phillies>lx.opp?'W':'L';for(let i=allPlayed.length-1;i>=0;i--){const isW=allPlayed[i].phillies>allPlayed[i].opp;if((streakType==='W'&&isW)||(streakType==='L'&&!isW))streakLen++;else break;}}
  const w10=last10.filter(x=>x.phillies>x.opp).length;
  const streakHtml=last10.length?`<div class="streak-card">
    <div class="streak-header">
      <span class="streak-lbl">Last ${last10.length} Games</span>
      ${streakLen?`<span class="streak-badge s${streakType.toLowerCase()}">${streakType}${streakLen} Streak</span>`:''}
    </div>
    <div class="streak-pills-row">${last10.map(x=>{const w=x.phillies>x.opp;return`<div class="pill ${w?'w':'l'}" title="${pt(x.d,x.t).short} vs ${x.opponent}: ${x.phillies}–${x.opp}">${w?'W':'L'}</div>`;}).join('')}</div>
    <div class="streak-footer"><strong>${w10}–${last10.length-w10}</strong> in last ${last10.length}</div>
  </div>`:'';
  return`${streakHtml}<div class="week-hdr"><span>⚾</span>${hdr}</div>${cards}`;
}

// ─── SERIES TRACKER ────────────────────────────────────────────────────────
function renderSeries() {
  const grps=seriesGroups(),played=ALL.filter(g=>g.played);
  const wins=played.filter(g=>g.phillies>g.opp).length,losses=played.filter(g=>g.phillies<g.opp).length;
  const gPlayed=wins+losses;
  let sw=0,sl=0,ss=0;
  for(const grp of grps){const r=seriesResult(grp.games);const done=grp.games.every(x=>x.played||x.inProgress);if(!done&&r!=='live')continue;if(r==='won'||r==='sweep')sw++;else if(r==='lost'||r==='swept')sl++;else if(r==='split')ss++;}
  const tot=sw+sl+ss,pct=tot>0?(sw/tot*100).toFixed(1)+'%':'—';

  const pills=grps.filter(g=>g.games.some(x=>x.played)).slice(-12).map(grp=>{const r=seriesResult(grp.games);const cls=(r==='won'||r==='sweep')?'w':(r==='lost'||r==='swept')?'l':'s';const lbl=(r==='won'||r==='sweep')?'W':(r==='lost'||r==='swept')?'L':'S';return`<div class="pill ${cls}">${lbl}</div>`;}).join('');

  // Pace
  let paceHtml='';
  if(gPlayed>0){const wp=wins/gPlayed,rem=162-gPlayed,pW=Math.round(162*wp),pL=162-pW,half=Math.round(rem/2),p5W=wins+half,p5L=losses+(rem-half);
    paceHtml=`<div class="pace-row">
      <div class="pace-box"><div class="pace-lbl">📈 Season Pace</div><div class="pace-num"><span class="pw">${pW}</span><span class="pd">–</span><span class="pl">${pL}</span></div><div class="pace-sub">at ${(wp*100).toFixed(1)}% win rate</div></div>
      <div class="pace-box"><div class="pace-lbl">⚖️ .500 Pace</div><div class="pace-num"><span class="pw">${p5W}</span><span class="pd">–</span><span class="pl">${p5L}</span></div><div class="pace-sub">.500 rest of ${rem} games</div></div>
    </div>`;}

  // Standings (NL East only in series tab)
  let stdHtml='';
  const nle=STANDINGS.filter(t=>t.divisionId===204).sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));
  if(nle.length){
    stdHtml=`<div class="std-wrap">
      <div class="std-header">NL East<div class="std-header-cols"><span class="std-header-col">W-L</span><span class="std-header-col">PCT</span><span class="std-header-col">GB</span></div></div>
      ${nle.map((t,i)=>{const ti=teamInfo(t.name);return`<div class="std-row ${t.isPhillies?'phils':''}"><span class="std-pos">${i+1}</span><span class="std-emoji">${ti.e}</span><span class="std-name">${t.name}</span><span class="std-wl">${t.wins}-${t.losses}</span><span class="std-pct">${t.pct}</span><span class="std-gb">${i===0?'—':t.divGb}</span></div>`;}).join('')}
    </div>`;}

  // Season grid
  const resCls=r=>({won:'won',sweep:'sweep',lost:'lost',swept:'swept',split:'split',live:'live',upcoming:'upcoming'})[r]||'upcoming';
  const resLbl=r=>({won:'W',sweep:'SWP',lost:'L',swept:'SWT',split:'S',live:'●',upcoming:'·'})[r]||'·';
  const gridTiles=grps.map((grp,i)=>{const r=seriesResult(grp.games),rc=resCls(r),ti=teamInfo(grp.opp);return`<button class="sg-tile ${rc}" onclick="jumpToSeries(${i})" title="${grp.opp}"><span class="sg-emoji">${ti.e}</span><span class="sg-abbr">${ti.a}</span><span class="sg-res">${resLbl(r)}</span></button>`;}).join('');

  // Series rows (full season)
  const rowCls=r=>({won:'won',sweep:'sweep',lost:'lost',swept:'swept',split:'split',live:'live-r',upcoming:'upcoming'})[r]||'upcoming';
  const badgeLbl=r=>({won:'WON',sweep:'🧹 SWEEP',lost:'LOST',swept:'💦 SWEPT',split:'SPLIT',live:'● LIVE',upcoming:'UPCOMING'})[r]||'';
  const seriesRows=grps.map((grp,idx)=>{
    const res=seriesResult(grp.games),rc=rowCls(res);
    const first=grp.games[0],lastG=grp.games[grp.games.length-1];
    const dr=`${pt(first.d,first.t).short}${grp.games.length>1?' – '+pt(lastG.d,lastG.t).short:''}`;
    const ti=teamInfo(grp.opp);
    const nG=grp.games.length;
    const cols=grp.games.map((g,gi)=>{
      if(g.inProgress&&g.phillies!=null){const pa=g.phillies>=g.opp;return`<div class="sr-game"><div class="sr-g-lbl">G${gi+1}</div><div class="sr-g-line ${pa?'row-win':''}"><span class="sr-g-abbr p">PHI</span><span class="sr-g-score live-s">${g.phillies}</span></div><div class="sr-g-line ${!pa?'row-win':''}"><span class="sr-g-abbr o">${ti.a}</span><span class="sr-g-score live-s">${g.opp}</span></div><div class="sr-g-result lv">LIVE</div></div>`;}
      if(g.played&&g.phillies!=null){const phiW=g.phillies>g.opp;const tv=g.broadcasts.length?getBc(g.broadcasts[0]):null;return`<div class="sr-game"><div class="sr-g-lbl">G${gi+1}</div><div class="sr-g-line ${phiW?'row-win':''}"><span class="sr-g-abbr p">PHI</span><span class="sr-g-score ${phiW?'win':'lose'}">${g.phillies}</span></div><div class="sr-g-line ${!phiW?'row-win':''}"><span class="sr-g-abbr o">${ti.a}</span><span class="sr-g-score ${!phiW?'win':'lose'}">${g.opp}</span></div><div class="sr-g-result ${phiW?'w':'l'}">${phiW?'WIN':'LOSS'}</div>${tv?`<div class="sr-g-tv">${tv.display.replace('NBC Sports Philly','NBCSP')}</div>`:''}</div>`;}
      if(g.postponed)return`<div class="sr-game"><div class="sr-g-lbl">G${gi+1}</div><div class="sr-g-score u">PPD</div></div>`;
      const {timeShort,short}=pt(g.d,g.t);const tv=g.broadcasts.length?getBc(g.broadcasts[0]):null;
      return`<div class="sr-game"><div class="sr-g-lbl">G${gi+1}</div><div class="sr-g-line"><span class="sr-g-abbr o" style="font-size:.44rem">${short}</span></div><div class="sr-g-score u">${timeShort}</div>${tv?`<div class="sr-g-tv">${tv.display.replace('NBC Sports Philly','NBCSP')}</div>`:''}</div>`;
    }).join('');
    return`<div class="sr-row ${rc}" id="sr-${idx}">
      <div class="sr-left">
        <span class="sr-badge ${rc}">${badgeLbl(res)}</span>
        <div class="sr-opp-info"><span class="sr-team-emoji">${ti.e}</span><span class="sr-opp-name">${grp.opp}</span></div>
        <span class="sr-ha">${first.isHome?'🏠 Home':'✈️ Away'}</span>
        <span class="sr-dates">${dr}</span>
        <span class="sr-gc">${nG}G series</span>
      </div>
      <div class="sr-right">${cols}</div>
    </div>`;
  }).join('');

  const winPctDisplay=gPlayed>0?(wins/gPlayed*100).toFixed(1)+'%':'—';
  return`
    <div class="sr-top">
      <div class="sr-top-title">2026 Season</div>
      <div class="sr-counts">
        <div class="sr-cbox"><div class="sr-cnum g">${wins}</div><div class="sr-clbl">Wins</div></div>
        <div class="sr-cbox"><div class="sr-cnum r">${losses}</div><div class="sr-clbl">Losses</div></div>
        <div class="sr-cbox"><div class="sr-cnum y">${winPctDisplay}</div><div class="sr-clbl">Win %</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
        <div style="background:var(--s2);border:1px solid var(--s3);border-radius:var(--r-sm);padding:8px;text-align:center">
          <div style="font-size:1.1rem;font-weight:900;font-family:'Arial Black',Arial,sans-serif;color:var(--win)">${sw}</div>
          <div style="font-size:.46rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-top:2px">Series Won</div>
        </div>
        <div style="background:var(--s2);border:1px solid var(--s3);border-radius:var(--r-sm);padding:8px;text-align:center">
          <div style="font-size:1.1rem;font-weight:900;font-family:'Arial Black',Arial,sans-serif;color:var(--loss)">${sl}</div>
          <div style="font-size:.46rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-top:2px">Series Lost</div>
        </div>
      </div>
      <div class="sr-pct">${pct}</div><div class="sr-pct-lbl">Series Win Rate</div>
      <div class="sr-pills" style="margin-top:10px">${pills||'<span style="color:var(--t4);font-size:.6rem">No completed series yet</span>'}</div>
    </div>
    <div class="ds-card">
      <button id="ds-btn" class="ds-toggle-btn" onclick="toggleDeepStats()">📊 Deep Stats ▼</button>
      <div id="ds-body" class="ds-body" style="display:none"></div>
    </div>
    <div class="sg-wrap">
      <div class="sg-title">Season at a glance — tap any tile to jump</div>
      <div class="sg-grid">${gridTiles}</div>
    </div>
    ${paceHtml}
    ${stdHtml}
    <div class="series-all-title">Full Season · All Series</div>
    ${seriesRows}`;
}

function jumpToSeries(i){const el=document.getElementById(`sr-${i}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}

// ─── DEEP STATS ─────────────────────────────────────────────────────────────
let PITCH_PLAYERS=null, HIT_STATS_D=null, deepLoaded=false, deepOpen=false;

function ipDec(ip){const[f,r='0']=String(ip||0).split('.');return parseInt(f)+parseInt(r)/3;}
function calcEra(ps){const er=ps.reduce((s,p)=>s+(+p.stat.earnedRuns||0),0),ip=ps.reduce((s,p)=>s+ipDec(p.stat.inningsPitched),0);return ip>0?(er/ip*9).toFixed(2):'—';}
function calcWhip(ps){const hbb=ps.reduce((s,p)=>s+(+p.stat.hits||0)+(+p.stat.baseOnBalls||0),0),ip=ps.reduce((s,p)=>s+ipDec(p.stat.inningsPitched),0);return ip>0?(hbb/ip).toFixed(2):'—';}

async function loadDeepStats() {
  if(deepLoaded) return;
  try {
    const [pd,hd]=await Promise.all([
      fetch(`${MLB_API}/stats?stats=season&group=pitching&teamId=${PHILLIES_ID}&season=${SEASON}&gameType=R&playerPool=All&limit=100`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`${MLB_API}/teams/${PHILLIES_ID}/stats?stats=season&group=hitting&season=${SEASON}&gameType=R`).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    PITCH_PLAYERS=pd?.stats?.[0]?.splits||null;
    HIT_STATS_D=hd?.stats?.[0]?.splits?.[0]?.stat||null;
    deepLoaded=true;
  } catch(e){console.error(e);}
  renderDeepBody();
}

function renderDeepBody() {
  const el=document.getElementById('ds-body'); if(!el) return;
  const played=ALL.filter(g=>g.played), gp=played.length;
  if(!gp){el.innerHTML='<div style="color:var(--t4);font-size:.68rem;text-align:center;padding:12px">No games played yet.</div>';return;}

  const rs=played.reduce((s,g)=>s+(g.phillies||0),0);
  const ra=played.reduce((s,g)=>s+(g.opp||0),0);
  const homeW=played.filter(g=>g.isHome&&g.phillies>g.opp).length, homeL=played.filter(g=>g.isHome&&g.phillies<g.opp).length;
  const awayW=played.filter(g=>!g.isHome&&g.phillies>g.opp).length, awayL=played.filter(g=>!g.isHome&&g.phillies<g.opp).length;
  const oneW=played.filter(g=>Math.abs(g.phillies-g.opp)===1&&g.phillies>g.opp).length, oneL=played.filter(g=>Math.abs(g.phillies-g.opp)===1&&g.phillies<g.opp).length;
  const blowW=played.filter(g=>(g.phillies-g.opp)>=5).length, blowL=played.filter(g=>(g.opp-g.phillies)>=5).length;
  const shutW=played.filter(g=>g.phillies>0&&g.opp===0).length, shutL=played.filter(g=>g.opp>0&&g.phillies===0).length;

  const rec=(w,l)=>`<span style="color:var(--win)">${w}</span><span style="color:var(--t4)"> – </span><span style="color:var(--loss)">${l}</span>`;
  const row=(lbl,val,sub='')=>`<div class="ds-row"><span class="ds-lbl">${lbl}</span><span class="ds-val">${val}${sub?`<span class="ds-sub">${sub}</span>`:''}</span></div>`;
  const diff=rs-ra; const diffStr=(diff>0?'+':'')+diff;

  // Pitching splits from player data
  let spEra='—',rpEra='—',spWhip='—',rpWhip='—';
  if(PITCH_PLAYERS) {
    const sp=PITCH_PLAYERS.filter(p=>(+p.stat.gamesStarted||0)/(+p.stat.gamesPlayed||1)>=0.5&&(+p.stat.gamesStarted||0)>=1);
    const rp=PITCH_PLAYERS.filter(p=>(+p.stat.gamesStarted||0)===0||(+p.stat.gamesStarted||0)/(+p.stat.gamesPlayed||1)<0.25);
    spEra=calcEra(sp); rpEra=calcEra(rp);
    spWhip=calcWhip(sp); rpWhip=calcWhip(rp);
  }

  // Hitting
  const avg=HIT_STATS_D?.avg||'—', ops=HIT_STATS_D?.ops||'—', slg=HIT_STATS_D?.slg||'—', obp=HIT_STATS_D?.obp||'—';

  el.innerHTML=`
    <div class="ds-section">Scoring</div>
    ${row('Runs/game scored',(rs/gp).toFixed(2))}
    ${row('Runs/game allowed',(ra/gp).toFixed(2))}
    ${row('Run differential',`<span style="color:${diff>=0?'var(--win)':'var(--loss)'}">${diffStr}</span>`,`${rs} R – ${ra} RA`)}
    <div class="ds-section">Splits</div>
    ${row('Home',rec(homeW,homeL))}
    ${row('Away',rec(awayW,awayL))}
    ${row('1-run games',rec(oneW,oneL))}
    ${row('Blowouts (5+ run margin)',rec(blowW,blowL))}
    ${row('Shutouts for / against',rec(shutW,shutL))}
    <div class="ds-section">Starting Pitching</div>
    ${row('Starters ERA',spEra)}
    ${row('Starters WHIP',spWhip)}
    <div class="ds-section">Bullpen</div>
    ${row('Bullpen ERA',rpEra)}
    ${row('Bullpen WHIP',rpWhip)}
    <div class="ds-section">Hitting</div>
    ${row('Team batting avg',avg)}
    ${row('On-base pct',obp)}
    ${row('Slugging',slg)}
    ${row('OPS',ops)}
    ${!deepLoaded?'<div style="color:var(--t4);font-size:.58rem;margin-top:8px;text-align:center">Pitching & hitting stats loading…</div>':''}
  `;
}

function toggleDeepStats() {
