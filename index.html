function renderStartersPl(){
  if(!PIT_STATS_ALL||!PIT_STATS_ALL.length)return'<div style="color:var(--t4);text-align:center;padding:32px;font-size:.72rem">No pitching data yet.</div>';
  const pit40=ROSTER_IDS.size>0?PIT_STATS_ALL.filter(p=>ROSTER_IDS.has(p.player.id)):PIT_STATS_ALL;
  const starters=pit40.filter(p=>(p.stat.gamesStarted||0)>=1);
  if(!starters.length)return'<div style="color:var(--t4);text-align:center;padding:32px;font-size:.72rem">No starters data yet.</div>';
  const s=plSortSp;
  const sortFn=(a,b)=>{
    const useIp=s.col==='inningsPitched';
    const av=useIp?ipDec(a.stat.inningsPitched):parseFloat(a.stat[s.col])||(s.col==='era'||s.col==='whip'?99:0);
    const bv=useIp?ipDec(b.stat.inningsPitched):parseFloat(b.stat[s.col])||(s.col==='era'||s.col==='whip'?99:0);
    return s.dir===-1?bv-av:av-bv;
  };
  // Split starters: main (active + IL), inactive (reassigned/released)
  const offRosterSp=ROSTER_IDS.size>0?PIT_STATS_ALL.filter(p=>!ROSTER_IDS.has(p.player.id)&&(p.stat.gamesStarted||0)>=1):[];
  const mainSp=starters.filter(p=>!ROSTER_STATUS[p.player.id]||isILStatus(ROSTER_STATUS[p.player.id]));
  const inactiveSp=[...starters.filter(p=>ROSTER_STATUS[p.player.id]&&!isILStatus(ROSTER_STATUS[p.player.id])),...offRosterSp];
  const sorted=[...mainSp].sort(sortFn);
  const qualIP=mainSp.filter(p=>ipDec(p.stat.inningsPitched)>=10);
  const byERA=[...qualIP].sort((a,b)=>(parseFloat(a.stat.era)||99)-(parseFloat(b.stat.era)||99));
  const byW=[...mainSp].sort((a,b)=>(b.stat.wins||0)-(a.stat.wins||0));
  const byK=[...mainSp].sort((a,b)=>(b.stat.strikeOuts||0)-(a.stat.strikeOuts||0));
  const byIP=[...mainSp].sort((a,b)=>ipDec(b.stat.inningsPitched)-ipDec(a.stat.inningsPitched));
  const col=s.col,dir=s.dir;
  const th=(lbl,key,title='')=>{const sorted=key===col;const arr=sorted?(dir===-1?'↓':'↑'):'';return`<th onclick="sortPl('starters','${key}')" class="${sorted?'pl-sorted':''}" title="${title}">${lbl}${arr?' '+arr:''}</th>`;};
  const ilStarters=mainSp.filter(p=>isILStatus(ROSTER_STATUS[p.player.id]));
  const rows=sorted.map(p=>{
    const st=p.stat;
    const rs=ROSTER_STATUS[p.player.id];
    const il=isILStatus(rs);
    const qs=st.qualityStarts!==undefined?st.qualityStarts:'—';
    const k9=ipDec(st.inningsPitched)>0?((st.strikeOuts||0)/ipDec(st.inningsPitched)*9).toFixed(1):'—';
    const ilBadge=il?`<span class="pl-il-badge">IL</span>`:'';
    return`<tr class="${il?'pl-il-row':''}">
      <td>${p.player.fullName}${ilBadge}</td>
      <td style="text-align:center">${st.wins||0}-${st.losses||0}</td>
      <td>${st.era||'—'}</td>
      <td>${st.whip||'—'}</td>
      <td>${st.inningsPitched||0}</td>

      <td>${st.strikeOuts||0}</td>
      <td>${k9}</td>
      <td>${st.baseOnBalls||0}</td>
      <td>${qs}</td>

    <div class="pl-tbl-wrap"><table class="pl-tbl">

      <tbody>${ilStarters.map(p=>{const st=p.stat;const rs=ROSTER_STATUS[p.player.id];return`<tr class="pl-il-row"><td>${p.player.fullName}</td><td style="color:var(--t3);font-size:.6rem">${rs.description||rs.code}</td><td>${st.wins||0}-${st.losses||0}</td><td>${st.era||'—'}</td><td>${st.inningsPitched||0}</td><td>${st.strikeOuts||0}</td></tr>`;}).join('')}</tbody>
    </table></div>`:'';
  const inactiveSection=inactiveSp.length?`<div class="pl-section-lbl pl-inactive-section-lbl">⬇️ No Longer Active (${inactiveSp.length})</div>
    <div class="pl-tbl-wrap"><table class="pl-tbl">
      <thead><tr><th style="text-align:left">Pitcher</th><th>Status</th><th>W-L</th><th>ERA</th><th>IP</th><th>K</th></tr></thead>
      <tbody>${inactiveSp.map(p=>{const st=p.stat;const rs=ROSTER_STATUS[p.player.id];const statusLabel=rs?(rs.description||rs.code):'Released / Not on Roster';return`<tr class="pl-il-row"><td>${p.player.fullName}</td><td style="color:var(--t3);font-size:.6rem">${statusLabel}</td><td>${st.wins||0}-${st.losses||0}</td><td>${st.era||'—'}</td><td>${st.inningsPitched||0}</td><td>${st.strikeOuts||0}</td></tr>`;}).join('')}</tbody>
    </table></div>`:'';
  return`<div class="pl-section-lbl">Leaders</div>
    <div class="pl-leaders">
      ${plLdrCard('ERA',byERA[0],byERA[0]?.stat.era||'—',`${byERA[0]?.stat.inningsPitched||0} IP · min 10`)}

        ${th('BB','baseOnBalls','Walks')}
        ${th('QS','qualityStarts','Quality Starts')}

}

// ─── TAB + LOAD ────────────────────────────────────────────────────────────
function updateNextTabLabel() {
  const el=document.getElementById('tab-next'); if(!el) return;
  const todayStr=new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});
  const hasGameToday=ALL.some(g=>g.d===todayStr&&!g.postponed);
  el.textContent=hasGameToday?'Today':'Next Game';
}
function sw(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.tab[onclick="sw('${tab}')"]`).classList.add('active');
  document.getElementById(`${tab}-c`).classList.add('active');
  renderTab(tab);
}
function renderTab(tab) {
  if(tab==='next'){document.getElementById('next-c').innerHTML=renderNext();const g=nextGame();if(g&&!g.played&&!g.inProgress){const ms=new Date(`${g.d}T${g.t}Z`).getTime();if(ms>Date.now())startCd(ms);}}
  if(tab==='schedule')  document.getElementById('schedule-c').innerHTML=renderSchedule();
  if(tab==='series')    document.getElementById('series-c').innerHTML=renderSeries();
  if(tab==='standings') document.getElementById('standings-c').innerHTML=renderStandings();
  if(tab==='players')   document.getElementById('players-c').innerHTML=renderPlayers();
}
function showSpinner(){['next-c','schedule-c','series-c','standings-c','players-c'].forEach(id=>{document.getElementById(id).innerHTML=`<div class="loading"><div class="spin"></div>Loading…</div>`;});}
function showError(msg){document.getElementById(`${currentTab}-c`).innerHTML=`<div class="err-box"><p>⚾ Couldn't load live data.<br>${msg}</p><button class="retry-btn" onclick="loadData(true)">Retry</button></div>`;}
async function loadData(force=false) {
  if(loading&&!force)return; loading=true;
  if(force||!ALL.length)showSpinner();
  try{
    const [s,d]=await Promise.all([fetchSchedule(),fetchStandings().catch(()=>null)]);
    ALL=parseGames(s); STANDINGS=d?parseStandings(d):[]; viewingGameIdx=null;
    document.getElementById('last-upd').textContent=`Updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
    updateNextTabLabel();
    renderTab(currentTab);
  }catch(err){console.error(err);showError(err.message||'Network error');}
  finally{loading=false;}
}
// ─── LIVE GAME FAST POLL ───────────────────────────────────────────────────
let livePoller=null;

async function pollLiveGame() {
  const live=ALL.find(g=>g.inProgress);
  if(!live) { stopLivePoller(); return; }
  try {
    // Use dedicated linescore endpoint — small payload, reliably includes
    // balls/strikes/outs and offense.first/second/third for base runners.
    const [lsRes, stRes] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/game/${live.gamePk}/linescore`),
      fetch(`https://statsapi.mlb.com/api/v1.1/game/${live.gamePk}/feed/live?fields=gameData,status,abstractGameState,detailedState`)
    ]);
    if(!lsRes.ok) return;
    const ls=await lsRes.json();
    let status=null;
    if(stRes.ok){ try{ const sd=await stRes.json(); status=sd.gameData?.status; }catch(e){} }
    if(!ls) return;

    // Update the live game object in ALL
    const idx=ALL.indexOf(live);
    if(idx===-1) return;
    const isHome=live.isHome;
    const homeRuns=ls.teams?.home?.runs??live.hs;
    const awayRuns=ls.teams?.away?.runs??live.as;
    ALL[idx]={
      ...live,
      phillies: isHome?homeRuns:awayRuns,
      opp:      isHome?awayRuns:homeRuns,
      hs: homeRuns, as: awayRuns,
            inProgress: status?status.abstractGameState==='Live':live.inProgress,
      played: status?(status.abstractGameState==='Final'||status.detailedState?.includes('Final')||status.detailedState==='Game Over'):live.played, status: status?.detailedState||live.status,
      inningStr: (()=>{const inn=ls.currentInning,half=ls.inningHalf;return inn?`${half==='Top'?'Top':'Bot'} ${inn}${inn===1?'st':inn===2?'nd':inn===3?'rd':'th'}`:'';})(),
      ls:{innings:ls.innings||live.ls?.innings||[],awayHits:ls.teams?.away?.hits,homeHits:ls.teams?.home?.hits,awayErrors:ls.teams?.away?.errors,homeErrors:ls.teams?.home?.errors},
      balls:ls.balls??null, strikes:ls.strikes??null, outs:ls.outs??null,
      offense:ls.offense||null,
      pitchCount:ls.defense?.pitcher?.pitchCount??null,
    };

    // If game just ended, reset live stats state and do a full reload
    if(ALL[idx].played) {
      stopLivePoller();
      liveStatsOpen=false; liveBoxLoaded=false; LIVE_BOX=null; LIVE_PLAYS_DATA=null;
      loadData(); return;
    }

    document.getElementById('last-upd').textContent=`Live · ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'})}`;
    renderTab(currentTab);

    // Refresh live box data silently if stats panel is open
    if(liveStatsOpen&&liveStatsGamePk===live.gamePk&&currentTab==='next'){
      loadLiveBox(live.gamePk);
    }
  } catch(e){ console.error('live poll error',e); }
}

function startLivePoller() {
  if(livePoller) return;
  pollLiveGame(); // fire immediately — no 15s wait for first count/base data
  livePoller=setInterval(pollLiveGame,7000);
}
function stopLivePoller() {
  if(livePoller){ clearInterval(livePoller); livePoller=null; }
}
function syncLivePoller() {
  ALL.some(g=>g.inProgress) ? startLivePoller() : stopLivePoller();
}

loadData();
setInterval(()=>{ loadData(); syncLivePoller(); },90000);
</script>
