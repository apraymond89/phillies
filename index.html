}

// ─── STANDINGS ─────────────────────────────────────────────────────────────
let stdFilter='division';
const DIV_ORDER=[204,205,203,201,202,200];
const DIV_NAMES={204:'NL East',205:'NL Central',203:'NL West',201:'AL East',202:'AL Central',200:'AL West'};

// Division header color themes
const DIV_BG={
  204:'linear-gradient(90deg,#6b0000 0%,#003087 100%)',       // NL East  — Phillies red+navy
  205:'linear-gradient(90deg,#0f2d1a 0%,#1a5c32 100%)',       // NL Central — forest green (Cardinals/Cubs vibe)
  203:'linear-gradient(90deg,#003087 0%,#1144aa 100%)',        // NL West  — Dodger blue
  201:'linear-gradient(90deg,#111120 0%,#1e1e3f 100%)',        // AL East  — pinstripe navy (Yankees)
  202:'linear-gradient(90deg,#4a1200 0%,#922600 100%)',        // AL Central — Tigers/White Sox orange-red
  200:'linear-gradient(90deg,#003d30 0%,#006652 100%)',        // AL West  — Mariners/A's teal
};
const DIV_ACCENT={
  204:'#7EB4D8', 205:'#86efac', 203:'#93c5fd',
  201:'#c4b5fd', 202:'#fdba74', 200:'#6ee7b7',
};
const LG_BG={
  104:'linear-gradient(90deg,#6b0000 0%,#003087 100%)',        // NL — red+navy
  103:'linear-gradient(90deg,#111120 0%,#1e3a5f 100%)',        // AL — slate blue
};
const LG_ACCENT={104:'#7EB4D8',103:'#93c5fd'};

function stdHdr(bg,accent,label,colHdr='<span class="std-header-col">W-L</span><span class="std-header-col">PCT</span><span class="std-header-col">GB</span>'){
  return`<div class="std-header" style="background:${bg};color:${accent}">${label}<div class="std-header-cols" style="opacity:.75">${colHdr}</div></div>`;
}

function renderStandings() {
  if(!STANDINGS.length) return '<div class="loading">No standings data yet.</div>';
  const filtersHtml=`<div class="std-sub-tabs">
    <button class="std-sub-btn ${stdFilter==='division'?'active':''}" onclick="setStdFilter('division')">Division</button>
    <button class="std-sub-btn ${stdFilter==='league'?'active':''}" onclick="setStdFilter('league')">League</button>
    <button class="std-sub-btn ${stdFilter==='wildcard'?'active':''}" onclick="setStdFilter('wildcard')">Wild Card</button>
  </div>`;

  function tRow(t,i,gbVal,firstSuffix) {
    const ti=teamInfo(t.name);
    const isFirst=i===0||!gbVal||gbVal==='-'||gbVal==='0.0'||gbVal==='0';
    return`<div class="std-row ${t.isPhillies?'phils':''}"><span class="std-pos">${i+1}</span><span class="std-emoji">${ti.e}</span><span class="std-name">${t.name}</span><span class="std-wl">${t.wins}-${t.losses}</span><span class="std-pct">${t.pct}</span><span class="std-gb">${isFirst?(firstSuffix||'—'):gbVal}</span></div>`;
  }

  let body='';
  if(stdFilter==='division') {
    for(const divId of DIV_ORDER) {
      const teams=STANDINGS.filter(t=>t.divisionId===divId).sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));
      if(!teams.length) continue;
      body+=`<div class="div-section"><div class="std-wrap">
        ${stdHdr(DIV_BG[divId],DIV_ACCENT[divId],DIV_NAMES[divId])}
        ${teams.map((t,i)=>tRow(t,i,t.divGb)).join('')}
      </div></div>`;
    }
  } else if(stdFilter==='league') {
    for(const [lgId,lgName] of [[104,'National League'],[103,'American League']]) {
      const teams=STANDINGS.filter(t=>t.leagueId===lgId).sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));
      if(!teams.length) continue;
      body+=`<div class="div-section"><div class="std-wrap">
        ${stdHdr(LG_BG[lgId],LG_ACCENT[lgId],lgName)}
        ${teams.map((t,i)=>tRow(t,i,t.gb)).join('')}
      </div></div>`;
    }
  } else {
    // Wild Card view — NL then AL
    for(const [lgId,lgName] of [[104,'NL'],[103,'AL']]) {
      const all=STANDINGS.filter(t=>t.leagueId===lgId);
      const leaders=all.filter(t=>t.isDivLeader).sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));
      const wcTeams=all.filter(t=>!t.isDivLeader).sort((a,b)=>{
        if(a.wcRank!==99&&b.wcRank!==99&&a.wcRank!==b.wcRank) return a.wcRank-b.wcRank;
        return parseFloat(b.pct)-parseFloat(a.pct);
      });
      const bg=LG_BG[lgId],ac=LG_ACCENT[lgId];
      body+=`<div class="div-section"><div class="std-wrap">
        ${stdHdr(bg,ac,lgName+' Division Leaders')}
        ${leaders.map((t,i)=>{const ti=teamInfo(t.name);return`<div class="std-row ${t.isPhillies?'phils':''}"><span class="std-pos" style="color:var(--win)">✓</span><span class="std-emoji">${ti.e}</span><span class="std-name">${t.name}<span class="div-ldr-mark"> ${DIV_NAMES[t.divisionId]?.split(' ').pop()}</span></span><span class="std-wl">${t.wins}-${t.losses}</span><span class="std-pct">${t.pct}</span><span class="std-gb">—</span></div>`;}).join('')}
      </div></div>
      <div class="div-section"><div class="std-wrap">
        ${stdHdr(bg,ac,lgName+' Wild Card Race','<span class="std-header-col">W-L</span><span class="std-header-col">PCT</span><span class="std-header-col">WC GB</span>')}
        ${wcTeams.map((t,i)=>{const ti=teamInfo(t.name);const inWc=i<3;const wcGb=t.wcGb;return`<div class="std-row ${t.isPhillies?'phils':''} ${inWc?'wc-in':''}"><span class="std-pos">${inWc?'W'+(i+1):(i+1)}</span><span class="std-emoji">${ti.e}</span><span class="std-name">${t.name}</span><span class="std-wl">${t.wins}-${t.losses}</span><span class="std-pct">${t.pct}</span><span class="std-gb">${i===0?'—':(!wcGb||wcGb==='—'?'—':wcGb)}</span></div>`;}).join('')}
      </div></div>`;
    }
  }
  return filtersHtml+body;
}
function setStdFilter(f){stdFilter=f;document.getElementById('standings-c').innerHTML=renderStandings();}

// ─── PLAYERS TAB ──────────────────────────────────────────────────────────────
let BAT_STATS=null, PIT_STATS_ALL=null, PLAYER_LOADED=false, PLAYER_LOADING=false;
let PLAYER_STREAKS={}; // playerId -> { hit:N, cold:N }
let plSubTab='offense';
let plSortOff={col:'ops',dir:-1}, plSortSp={col:'era',dir:1}, plSortBp={col:'era',dir:1};

function setPlSubTab(t){plSubTab=t;const el=document.getElementById('players-c');if(el)el.innerHTML=renderPlayers();}

function sortPl(tab,col){
  const s=tab==='offense'?plSortOff:tab==='starters'?plSortSp:plSortBp;
  if(s.col===col)s.dir=-s.dir;
  else{s.col=col;s.dir=(col==='era'||col==='whip')?1:-1;}
  const el=document.getElementById('players-c');if(el)el.innerHTML=renderPlayers();
}

async function loadPlayerStats(){
  if(PLAYER_LOADING)return; PLAYER_LOADING=true;
  try{
    const[bd,pd,ild]=await Promise.all([
      fetch(`${MLB_API}/stats?stats=season&group=hitting&teamId=${PHILLIES_ID}&season=${SEASON}&gameType=R&playerPool=All&limit=100`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`${MLB_API}/stats?stats=season&group=pitching&teamId=${PHILLIES_ID}&season=${SEASON}&gameType=R&playerPool=All&limit=100`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`${MLB_API}/teams/${PHILLIES_ID}/roster?rosterType=40Man&season=${SEASON}`).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    BAT_STATS=(bd?.stats?.[0]?.splits||[]).filter(p=>(p.stat.atBats||0)>0);
    PIT_STATS_ALL=(pd?.stats?.[0]?.splits||[]).filter(p=>(p.stat.gamesPlayed||0)>0);
    IL_PLAYERS=new Set((ild?.roster||[]).filter(p=>{const c=p.status?.code||'';return c.startsWith('IL')||c.startsWith('DL');}).map(p=>p.person?.id).filter(Boolean));
    ROSTER_IDS=new Set((ild?.roster||[]).map(p=>p.person?.id).filter(Boolean));
    PLAYER_LOADED=true;
    if(currentTab==='players'){const el=document.getElementById('players-c');if(el)el.innerHTML=renderPlayers();}
    loadHitStreaks();
  }catch(e){console.error('Player stats error',e);}
  finally{PLAYER_LOADING=false;}
}

async function loadHitStreaks(){
  if(!BAT_STATS||!BAT_STATS.length)return;
  const qualified=BAT_STATS.filter(p=>(p.stat.atBats||0)>=15);
  const results=await Promise.allSettled(qualified.map(p=>
    fetch(`${MLB_API}/people/${p.player.id}/stats?stats=gameLog&group=hitting&season=${SEASON}&gameType=R`)
      .then(r=>r.ok?r.json():null)
      .then(d=>{
        const games=(d?.stats?.[0]?.splits||[]).sort((a,b)=>b.date>a.date?1:-1);
        let hit=0,cold=0,i=0;
        while(i<games.length&&(games[i].stat?.hits||0)>0){hit++;i++;}
        if(hit===0){i=0;while(i<games.length&&(games[i].stat?.hits||0)===0){cold++;i++;}}
        return{id:p.player.id,hit,cold};
      }).catch(()=>null)
  ));
  let changed=false;
  for(const r of results){if(r.status==='fulfilled'&&r.value){PLAYER_STREAKS[r.value.id]=r.value;changed=true;}}
  if(changed&&currentTab==='players'){const el=document.getElementById('players-c');if(el)el.innerHTML=renderPlayers();}
}

function renderPlayers(){
  const subTabsHtml=`<div class="pl-sub-tabs">
    <button class="pl-sub-btn ${plSubTab==='offense'?'active':''}" onclick="setPlSubTab('offense')">⚾ Offense</button>
    <button class="pl-sub-btn ${plSubTab==='starters'?'active':''}" onclick="setPlSubTab('starters')">🏁 Starters</button>
    <button class="pl-sub-btn ${plSubTab==='bullpen'?'active':''}" onclick="setPlSubTab('bullpen')">🔥 Bullpen</button>
  </div>`;
  if(!PLAYER_LOADED){if(!PLAYER_LOADING)loadPlayerStats();return subTabsHtml+'<div class="loading"><div class="spin"></div>Loading player stats…</div>';}
  let body='';
  if(plSubTab==='offense')body=renderOffense();
  else if(plSubTab==='starters')body=renderStartersPl();
  else body=renderBullpenPl();
  return subTabsHtml+body;
}

function plLdrCard(cat,p,val,sub){
  if(!p)return'<div class="pl-ldr-card"><div class="pl-ldr-cat">'+cat+'</div><div class="pl-ldr-val" style="color:var(--t4)">—</div></div>';
  const nm=p.player.fullName.split(' ').pop();
  return`<div class="pl-ldr-card"><div class="pl-ldr-cat">${cat}</div><div class="pl-ldr-val">${val}</div><div class="pl-ldr-name">${nm}</div>${sub?`<div class="pl-ldr-sub">${sub}</div>`:''}</div>`;
}

function renderOffense(){
  if(!BAT_STATS||!BAT_STATS.length)return'<div style="color:var(--t4);text-align:center;padding:32px;font-size:.72rem">No batting data yet.</div>';
  const s=plSortOff;
  const sortFn=(a,b)=>{
    const av=parseFloat(a.stat[s.col])||0, bv=parseFloat(b.stat[s.col])||0;
    return s.dir===-1?bv-av:av-bv;
  };
  const players=[...BAT_STATS].sort(sortFn);
  const byHR=[...BAT_STATS].sort((a,b)=>(b.stat.homeRuns||0)-(a.stat.homeRuns||0));
  const byRBI=[...BAT_STATS].sort((a,b)=>(b.stat.rbi||0)-(a.stat.rbi||0));
  const qual=BAT_STATS.filter(p=>(p.stat.atBats||0)>=30);
  const byAVG=[...qual].sort((a,b)=>parseFloat(b.stat.avg||0)-parseFloat(a.stat.avg||0));
  const byOPS=[...qual].sort((a,b)=>parseFloat(b.stat.ops||0)-parseFloat(a.stat.ops||0));
  const col=s.col,dir=s.dir;
  const th=(lbl,key,title='')=>{const sorted=key===col;const arr=sorted?(dir===-1?'↓':'↑'):'';return`<th onclick="sortPl('offense','${key}')" class="${sorted?'pl-sorted':''}" title="${title}">${lbl}${arr?' '+arr:''}</th>`;};
  const streaksLoaded=Object.keys(PLAYER_STREAKS).length>0;
  const rows=players.map(p=>{
    const st=p.stat,pid=p.player.id;
    const sk=PLAYER_STREAKS[pid];
    const streakBadge=sk?(sk.hit>=2?`<span class="pl-streak hot">🔥${sk.hit}</span>`:sk.cold>=5?`<span class="pl-streak cold">🥶${sk.cold}</span>`:''): '';
    const ilBadge=IL_PLAYERS.has(pid)?'<span class="pl-streak" style="color:var(--gold);
    const onRoster=ROSTER_IDS.size===0||ROSTER_IDS.has(pid);font-size:.65rem" title="Injured List">🩹</span>':'';
    return`<tr style="cursor:pointer${onRoster?'':';opacity:.45'}" onclick="showPlayerLog(${pid},'${p.player.fullName.replace(/'/g,'\\\'').replace(/"/g,'&quot;')}','hitting')">
      <td>${p.player.fullName}${streakBadge}${ilBadge}</td>
      <td>${st.gamesPlayed||0}</td>
      <td>${st.avg||'.---'}</td>
      <td>${st.homeRuns||0}</td>
      <td>${st.rbi||0}</td>
      <td>${st.runs||0}</td>
      <td>${st.hits||0}</td>
      <td>${st.doubles||0}</td>
      <td>${st.baseOnBalls||0}</td>
      <td>${st.strikeOuts||0}</td>
      <td>${st.ops||'.---'}</td>
    </tr>`;
  }).join('');
  return`<div class="pl-section-lbl">Leaders</div>
    <div class="pl-leaders">
      ${plLdrCard('Home Runs',byHR[0],byHR[0]?.stat.homeRuns||0,`${byHR[0]?.stat.rbi||0} RBI`)}
      ${plLdrCard('RBI',byRBI[0],byRBI[0]?.stat.rbi||0,`${byRBI[0]?.stat.homeRuns||0} HR`)}
      ${plLdrCard('Batting Avg',byAVG[0],byAVG[0]?.stat.avg||'.---',`${byAVG[0]?.stat.atBats||0} AB · min 30`)}
      ${plLdrCard('OPS',byOPS[0],byOPS[0]?.stat.ops||'.---',`OBP ${byOPS[0]?.stat.obp||0}`)}
    </div>
    <div class="pl-section-lbl">All Hitters · ${players.length} players · Click column to sort${streaksLoaded?' · 🔥 hit streak · 🥶 hitless (5+) · 🩹 IL · faded = off roster':' · Loading streaks…'}</div>
    <div class="pl-tbl-wrap"><table class="pl-tbl">
      <thead><tr>
        <th onclick="sortPl('offense','avg')" style="text-align:left">Player</th>
        ${th('G','gamesPlayed','Games Played')}
        ${th('AVG','avg','Batting Average')}
        ${th('HR','homeRuns','Home Runs')}
        ${th('RBI','rbi','Runs Batted In')}
        ${th('R','runs','Runs Scored')}
        ${th('H','hits','Hits')}
        ${th('2B','doubles','Doubles')}
        ${th('BB','baseOnBalls','Walks')}
        ${th('K','strikeOuts','Strikeouts')}
        ${th('OPS','ops','On-base + Slugging')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function renderStartersPl(){
  if(!PIT_STATS_ALL||!PIT_STATS_ALL.length)return'<div style="color:var(--t4);text-align:center;padding:32px;font-size:.72rem">No pitching data yet.</div>';
  const starters=PIT_STATS_ALL.filter(p=>(p.stat.gamesStarted||0)>=1);
  if(!starters.length)return'<div style="color:var(--t4);text-align:center;padding:32px;font-size:.72rem">No starters data yet.</div>';
  const s=plSortSp;
  const sortFn=(a,b)=>{
    const useIp=s.col==='inningsPitched';
    const av=useIp?ipDec(a.stat.inningsPitched):parseFloat(a.stat[s.col])||(s.col==='era'||s.col==='whip'?99:0);
    const bv=useIp?ipDec(b.stat.inningsPitched):parseFloat(b.stat[s.col])||(s.col==='era'||s.col==='whip'?99:0);
    return s.dir===-1?bv-av:av-bv;
  };
  const sorted=[...starters].sort(sortFn);
  const qualIP=starters.filter(p=>ipDec(p.stat.inningsPitched)>=10);
  const byERA=[...qualIP].sort((a,b)=>(parseFloat(a.stat.era)||99)-(parseFloat(b.stat.era)||99));
  const byW=[...starters].sort((a,b)=>(b.stat.wins||0)-(a.stat.wins||0));
  const byK=[...starters].sort((a,b)=>(b.stat.strikeOuts||0)-(a.stat.strikeOuts||0));
  const byIP=[...starters].sort((a,b)=>ipDec(b.stat.inningsPitched)-ipDec(a.stat.inningsPitched));
  const col=s.col,dir=s.dir;
  const th=(lbl,key,title='')=>{const sorted=key===col;const arr=sorted?(dir===-1?'↓':'↑'):'';return`<th onclick="sortPl('starters','${key}')" class="${sorted?'pl-sorted':''}" title="${title}">${lbl}${arr?' '+arr:''}</th>`;};
  const rows=sorted.map(p=>{
    const st=p.stat;
    const qs=st.qualityStarts!==undefined?st.qualityStarts:'—';
    const k9=ipDec(st.inningsPitched)>0?((st.strikeOuts||0)/ipDec(st.inningsPitched)*9).toFixed(1):'—';
    const ilBadgePit=IL_PLAYERS.has(p.player.id)?'<span class="pl-streak" style="color:var(--gold);
    const onRosterPit=ROSTER_IDS.size===0||ROSTER_IDS.has(p.player.id);font-size:.65rem" title="Injured List">🩹</span>':'';
    return`<tr style="cursor:pointer${onRosterPit?'':';opacity:.45'}" onclick="showPlayerLog(${p.player.id},'${p.player.fullName.replace(/'/g,'\\\'').replace(/"/g,'&quot;')}','pitching')">
      <td>${p.player.fullName}${ilBadgePit}</td>
      <td style="text-align:center">${st.wins||0}-${st.losses||0}</td>
      <td>${st.era||'—'}</td>
      <td>${st.whip||'—'}</td>
      <td>${st.inningsPitched||0}</td>
      <td>${st.gamesStarted||0}</td>
      <td>${st.strikeOuts||0}</td>
      <td>${k9}</td>
      <td>${st.baseOnBalls||0}</td>
      <td>${qs}</td>
    </tr>`;
  }).join('');
  return`<div class="pl-section-lbl">Leaders</div>
    <div class="pl-leaders">
      ${plLdrCard('ERA',byERA[0],byERA[0]?.stat.era||'—',`${byERA[0]?.stat.inningsPitched||0} IP · min 10`)}
      ${plLdrCard('Wins',byW[0],byW[0]?.stat.wins||0,`${byW[0]?.stat.losses||0} L`)}
      ${plLdrCard('Strikeouts',byK[0],byK[0]?.stat.strikeOuts||0,`${byK[0]?.stat.inningsPitched||0} IP`)}
      ${plLdrCard('Innings Pitched',byIP[0],byIP[0]?.stat.inningsPitched||0,`${byIP[0]?.stat.gamesStarted||0} GS`)}
    </div>
    <div class="pl-section-lbl">${starters.length} Starting Pitchers · Click column to sort</div>
    <div class="pl-tbl-wrap"><table class="pl-tbl">
      <thead><tr>
        <th onclick="sortPl('starters','era')" style="text-align:left">Pitcher</th>
        ${th('W-L','wins','Wins-Losses')}
        ${th('ERA','era','Earned Run Average')}
        ${th('WHIP','whip','Walks + Hits per IP')}
        ${th('IP','inningsPitched','Innings Pitched')}
        ${th('GS','gamesStarted','Games Started')}
        ${th('K','strikeOuts','Strikeouts')}
        <th title="Strikeouts per 9 IP">K/9</th>
        ${th('BB','baseOnBalls','Walks')}
        ${th('QS','qualityStarts','Quality Starts')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function renderBullpenPl(){
  if(!PIT_STATS_ALL||!PIT_STATS_ALL.length)return'<div style="color:var(--t4);text-align:center;padding:32px;font-size:.72rem">No pitching data yet.</div>';
  const rp=PIT_STATS_ALL.filter(p=>(p.stat.gamesStarted||0)===0||(p.stat.gamesStarted||0)/(p.stat.gamesPlayed||1)<0.25);
  if(!rp.length)return'<div style="color:var(--t4);text-align:center;padding:32px;font-size:.72rem">No bullpen data yet.</div>';
  const s=plSortBp;
  const sortFn=(a,b)=>{
    const useIp=s.col==='inningsPitched';
    const av=useIp?ipDec(a.stat.inningsPitched):parseFloat(a.stat[s.col])||(s.col==='era'||s.col==='whip'?99:0);
    const bv=useIp?ipDec(b.stat.inningsPitched):parseFloat(b.stat[s.col])||(s.col==='era'||s.col==='whip'?99:0);
    return s.dir===-1?bv-av:av-bv;
  };
  const sorted=[...rp].sort(sortFn);
  const withIP=rp.filter(p=>ipDec(p.stat.inningsPitched)>=3);
  const byERA=[...withIP].sort((a,b)=>(parseFloat(a.stat.era)||99)-(parseFloat(b.stat.era)||99));
  const bySV=[...rp].sort((a,b)=>(b.stat.saves||0)-(a.stat.saves||0));
  const byHLD=[...rp].sort((a,b)=>(b.stat.holds||0)-(a.stat.holds||0));
  const byK=[...rp].sort((a,b)=>(b.stat.strikeOuts||0)-(a.stat.strikeOuts||0));
  const col=s.col,dir=s.dir;
  const th=(lbl,key,title='')=>{const sorted=key===col;const arr=sorted?(dir===-1?'↓':'↑'):'';return`<th onclick="sortPl('bullpen','${key}')" class="${sorted?'pl-sorted':''}" title="${title}">${lbl}${arr?' '+arr:''}</th>`;};
  const rows=sorted.map(p=>{
    const st=p.stat;
    const bs=st.blownSaves!==undefined?st.blownSaves:'—';
    const sv=st.saves||0,svo=st.saveOpportunities||0;
    const k9=ipDec(st.inningsPitched)>0?((st.strikeOuts||0)/ipDec(st.inningsPitched)*9).toFixed(1):'—';
    const ilBadgePit=IL_PLAYERS.has(p.player.id)?'<span class="pl-streak" style="color:var(--gold);
    const onRosterPit=ROSTER_IDS.size===0||ROSTER_IDS.has(p.player.id);font-size:.65rem" title="Injured List">🩹</span>':'';
    return`<tr style="cursor:pointer${onRosterPit?'':';opacity:.45'}" onclick="showPlayerLog(${p.player.id},'${p.player.fullName.replace(/'/g,'\\\'').replace(/"/g,'&quot;')}','pitching')">
      <td>${p.player.fullName}${ilBadgePit}</td>
      <td style="text-align:center">${st.wins||0}-${st.losses||0}</td>
      <td>${st.era||'—'}</td>
      <td>${sv}${svo>0?`<span style="color:var(--t3);font-size:.52rem">/${svo}</span>`:''}</td>
      <td>${st.holds||0}</td>
      <td>${bs}</td>
      <td>${st.whip||'—'}</td>
      <td>${st.inningsPitched||0}</td>
      <td>${st.strikeOuts||0}</td>
      <td>${k9}</td>
      <td>${st.gamesPlayed||0}</td>
    </tr>`;
  }).join('');
  return`<div class="pl-section-lbl">Leaders</div>
    <div class="pl-leaders">
      ${plLdrCard('ERA',byERA[0],byERA[0]?.stat.era||'—',`${byERA[0]?.stat.inningsPitched||0} IP · min 3`)}
      ${plLdrCard('Saves',bySV[0],bySV[0]?.stat.saves||0,`${bySV[0]?.stat.saveOpportunities||0} opp`)}
      ${plLdrCard('Holds',byHLD[0],byHLD[0]?.stat.holds||0,`${byHLD[0]?.stat.gamesPlayed||0} G`)}
      ${plLdrCard('Strikeouts',byK[0],byK[0]?.stat.strikeOuts||0,`${byK[0]?.stat.inningsPitched||0} IP`)}
    </div>
    <div class="pl-section-lbl">${rp.length} Relief Pitchers · Click column to sort</div>
    <div class="pl-tbl-wrap"><table class="pl-tbl">
      <thead><tr>
        <th onclick="sortPl('bullpen','era')" style="text-align:left">Pitcher</th>
        ${th('W-L','wins','Wins-Losses')}
        ${th('ERA','era','Earned Run Average')}
        ${th('SV','saves','Saves / Opportunities')}
        ${th('HLD','holds','Holds')}
        ${th('BS','blownSaves','Blown Saves')}
        ${th('WHIP','whip','Walks + Hits per IP')}
        ${th('IP','inningsPitched','Innings Pitched')}
        ${th('K','strikeOuts','Strikeouts')}
        <th title="Strikeouts per 9 IP">K/9</th>
        ${th('G','gamesPlayed','Games Played')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

// ─── TAB + LOAD ────────────────────────────────────────────────────────────
function updateNextTabLabel() {
  const el=document.getElementById('tab-next'); if(!el) return;
  const hasGameToday=ALL.some(g=>g.d===todayStr()&&!g.postponed);
  el.textContent=hasGameToday?'Today':'Next Game';
}
function sw(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.tab[onclick="sw('${tab}')"]`).classList.add('active');
  document.getElementById(`${tab}-c`).classList.add('active');
  renderTab(tab);
}
function renderTab(tab) {
  if(tab==='next'){document.getElementById('next-c').innerHTML=renderNext();const g=nextGame();if(g&&!g.played&&!g.inProgress){const ms=new Date(`${g.d}T${g.t}Z`).getTime();if(ms>Date.now())startCd(ms);}}
  if(tab==='schedule')  document.getElementById('schedule-c').innerHTML=renderSchedule();
  if(tab==='series')    document.getElementById('series-c').innerHTML=renderSeries();
  if(tab==='standings') document.getElementById('standings-c').innerHTML=renderStandings();
  if(tab==='players')   document.getElementById('players-c').innerHTML=renderPlayers();
}
function showSpinner(){['next-c','schedule-c','series-c','standings-c','players-c'].forEach(id=>{document.getElementById(id).innerHTML=`<div class="loading"><div class="spin"></div>Loading…</div>`;});}
function showError(msg){document.getElementById(`${currentTab}-c`).innerHTML=`<div class="err-box"><p>⚾ Couldn't load live data.<br>${msg}</p><button class="retry-btn" onclick="loadData(true)">Retry</button></div>`;}
async function loadData(force=false) {
  if(loading&&!force)return; loading=true;
  if(force||!ALL.length)showSpinner();
  try{
    const [s,d]=await Promise.all([fetchSchedule(),fetchStandings().catch(()=>null)]);
    ALL=parseGames(s); STANDINGS=d?parseStandings(d):[]; viewingGameIdx=null;
    const lu=document.getElementById('last-upd');lu.textContent=`Updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;lu.classList.remove('live');
    updateNextTabLabel();
    renderTab(currentTab);
  }catch(err){console.error(err);showError(err.message||'Network error');}
  finally{loading=false;}
}
// ─── LIVE GAME FAST POLL ───────────────────────────────────────────────────
let livePoller=null;

async function pollLiveGame() {
  const live=ALL.find(g=>g.inProgress);
  if(!live) { stopLivePoller(); return; }
  try {
    // Use dedicated linescore endpoint — small payload, reliably includes
    // balls/strikes/outs and offense.first/second/third for base runners.
    // Fetch status separately with a minimal fields filter.
    const [lsRes, stRes] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/game/${live.gamePk}/linescore`),
      fetch(`https://statsapi.mlb.com/api/v1.1/game/${live.gamePk}/feed/live?fields=gameData,status,abstractGameState,detailedState`)
    ]);
    if(!lsRes.ok) return;
    const ls=await lsRes.json();
    let status=null;
    if(stRes.ok){ try{ const sd=await stRes.json(); status=sd.gameData?.status; }catch(e){} }
    if(!ls) return;

    // Update the live game object in ALL
    const idx=ALL.indexOf(live);
    if(idx===-1) return;
    const isHome=live.isHome;
    const homeRuns=ls.teams?.home?.runs??live.hs;
    const awayRuns=ls.teams?.away?.runs??live.as;
    const isLive=status?status.abstractGameState==='Live':live.inProgress;
    const isFinal=status?(status.abstractGameState==='Final'||status.detailedState?.includes('Final')||status.detailedState==='Game Over'):live.played;
    ALL[idx]={
      ...live,
      phillies: isHome?homeRuns:awayRuns,
      opp:      isHome?awayRuns:homeRuns,
      hs: homeRuns, as: awayRuns,
      inProgress: isLive,
      played: isFinal,
      status: status?.detailedState||live.status,
      inningStr: (()=>{const inn=ls.currentInning,half=ls.inningHalf;return inn?`${half==='Top'?'Top':'Bot'} ${inn}${inn===1?'st':inn===2?'nd':inn===3?'rd':'th'}`:'';})(),
      ls:{innings:ls.innings||live.ls?.innings||[],awayHits:ls.teams?.away?.hits,homeHits:ls.teams?.home?.hits,awayErrors:ls.teams?.away?.errors,homeErrors:ls.teams?.home?.errors},
      balls:ls.balls??null, strikes:ls.strikes??null, outs:ls.outs??null,
      offense:ls.offense||null,
      batter:ls.offense?.batter?.fullName||null,
      pitcher:ls.defense?.pitcher?.fullName||null,
      pitcherId:ls.defense?.pitcher?.id||null,
    };

    // If game just ended, reset live stats state and do a full reload
    if(ALL[idx].played) {
      stopLivePoller();
      liveStatsOpen=false; liveBoxLoaded=false; LIVE_BOX=null; LIVE_PLAYS_DATA=null;
      loadData(); return;
    }

    const lu2=document.getElementById('last-upd');lu2.textContent=`● Live · ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'})}`;lu2.classList.add('live');
    renderTab(currentTab);

    // Refresh live box data silently if stats panel is open
    if(liveStatsOpen&&liveStatsGamePk===live.gamePk&&currentTab==='next'){
      loadLiveBox(live.gamePk);
    }
  } catch(e){ console.error('live poll error',e); }
}

function startLivePoller() {
  if(livePoller) return;
  pollLiveGame(); // fire immediately — don't wait 15s for first count/base data
  livePoller=setInterval(pollLiveGame,7000);
}
function stopLivePoller() {
  if(livePoller){ clearInterval(livePoller); livePoller=null; }
}
function syncLivePoller() {
  ALL.some(g=>g.inProgress) ? startLivePoller() : stopLivePoller();
}

loadData();
setInterval(()=>{ loadData(); syncLivePoller(); },90000);

(function setupSwipe(){
  let tx=0,ty=0;
  document.addEventListener('touchstart',e=>{
    const z=document.getElementById('today-swipe-zone');
    if(!z||!z.contains(e.target)&&e.target.closest&&!e.target.closest('#next-c'))return;
    tx=e.touches[0].clientX; ty=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(currentTab!=='next')return;
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){navGame(dx<0?1:-1);}
  },{passive:true});
})();

// ─── PLAYER GAME LOG MODAL ────────────────────────────────────────────────
function closePlayerModal(){document.getElementById('pl-modal-overlay').style.display='none';}
async function showPlayerLog(pid,name,group){
  const overlay=document.getElementById('pl-modal-overlay');
  const titleEl=document.getElementById('pl-modal-title');
  const subEl=document.getElementById('pl-modal-sub');
  const bodyEl=document.getElementById('pl-modal-body');
  titleEl.textContent=name;
  subEl.textContent=`2026 ${group==='pitching'?'Pitching':'Batting'} Game Log`;
  bodyEl.innerHTML='<div class="loading"><div class="spin"></div>Loading…</div>';
  overlay.style.display='flex';
  try {
    const r=await fetch(`https://statsapi.mlb.com/api/v1/people/${pid}/stats?stats=gameLog&gameType=R&season=${SEASON}&group=${group}`);
    if(!r.ok) throw new Error('API error');
    const d=await r.json();
    const splits=(d.stats?.[0]?.splits||[]).slice(-20).reverse();
    if(!splits.length){bodyEl.innerHTML='<div style="text-align:center;color:var(--t4);padding:32px;font-size:.72rem">No game log available yet.</div>';return;}
    if(group==='pitching'){
      const rows=splits.map(s=>{
        const g=s.stat,date=s.date?.substring(5)||'',opp=(s.isHome?'vs ':'@ ')+(s.opponent?.abbreviation||'?');
        const result=s.isWin?'W':s.isLoss?'L':'ND';
        const cls=s.isWin?'gl-win':s.isLoss?'gl-loss':'';
        return`<tr class="${cls}"><td>${date} ${opp}</td><td>${result}</td><td>${g.inningsPitched||'—'}</td><td>${g.hits||0}</td><td>${g.earnedRuns||0}</td><td>${g.baseOnBalls||0}</td><td>${g.strikeOuts||0}</td><td>${g.era||'—'}</td></tr>`;
      }).join('');
      bodyEl.innerHTML=`<table class="pl-gl-tbl"><thead><tr><th style="text-align:left">Game</th><th>DEC</th><th>IP</th><th>H</th><th>ER</th><th>BB</th><th>K</th><th>ERA</th></tr></thead><tbody>${rows}</tbody></table>`;
    } else {
      const rows=splits.map(s=>{
        const g=s.stat,date=s.date?.substring(5)||'',opp=(s.isHome?'vs ':'@ ')+(s.opponent?.abbreviation||'?');
        const ab=g.atBats||0,h=g.hits||0;
        return`<tr><td>${date} ${opp}</td><td>${h}-${ab}</td><td>${g.runs||0}</td><td>${g.rbi||0}</td><td>${g.baseOnBalls||0}</td><td>${g.strikeOuts||0}</td><td>${g.avg||'—'}</td></tr>`;
      }).join('');
      bodyEl.innerHTML=`<table class="pl-gl-tbl"><thead><tr><th style="text-align:left">Game</th><th>H-AB</th><th>R</th><th>RBI</th><th>BB</th><th>K</th><th>AVG</th></tr></thead><tbody>${rows}</tbody></table>`;
    }
  } catch(e) {
    bodyEl.innerHTML='<div style="text-align:center;color:var(--t4);padding:32px;font-size:.72rem">Couldn\'t load game log.</div>';
  }
}
